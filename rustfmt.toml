# SOTA 2025 Rust formatting configuration (stable channel)
# See: https://rust-lang.github.io/rustfmt/

edition = "2021"
max_width = 100
tab_spaces = 4
hard_tabs = false
newline_style = "Unix"
use_small_heuristics = "Default"

# Import organization (stable options only)
reorder_imports = true
reorder_modules = true
