# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
# This is the SINGLE source of advisory ignores for cargo-DENY. The cargo-AUDIT
# side has its own ignore list in .cargo/audit.toml (the file cargo-audit reads)
# — the two tools are configured separately on purpose (#366). Keep this list in
# mind when updating advisory ignores: a RUSTSEC may need ignoring in both files.
# Ignore unmaintained crates where no alternative exists (transitive deps)
ignore = [
    # paste is unmaintained but required by leptos; no safe upgrade path
    # https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
    # proc-macro-error2 is unmaintained but pulled in transitively by both
    # leptos (leptos_macro / reactive_stores_macro / syn_derive) and sea-orm
    # (sea-bae). Build-time proc-macro dep only, not a runtime vulnerability;
    # no upgrade path until those frameworks migrate (dependency-refresh #343).
    # https://rustsec.org/advisories/RUSTSEC-2026-0173
    "RUSTSEC-2026-0173",
]

[licenses]
version = 2
confidence-threshold = 0.92

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",  # webpki-roots
]

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
# Allow wildcards for workspace crates (internal dependencies)
wildcards = "allow"
highlight = "all"

skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
