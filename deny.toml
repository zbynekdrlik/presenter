# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
# Ignore unmaintained crates where no alternative exists (transitive deps)
ignore = [
    # paste is unmaintained but required by leptos; no safe upgrade path
    # https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
    # webrtc-rs transitive deps (webrtc-dtls 0.7.2) use old crypto crates
    "RUSTSEC-2024-0344", # curve25519-dalek
    "RUSTSEC-2025-0009", # ring
    "RUSTSEC-2024-0336", # rustls
    "RUSTSEC-2023-0052", # webpki
    "RUSTSEC-2021-0060", # aes-soft
    "RUSTSEC-2021-0059", # aesni
    "RUSTSEC-2025-0141", # bincode
    "RUSTSEC-2025-0010", # webrtc-dtls
]

[licenses]
version = 2
confidence-threshold = 0.92

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "CDLA-Permissive-2.0",  # webpki-roots
]

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
# Allow wildcards for workspace crates (internal dependencies)
wildcards = "allow"
highlight = "all"

skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
