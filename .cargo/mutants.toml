# cargo-mutants configuration (airuleset mutation-testing.md).
#
# The mutants profile (see [profile.mutants] in the workspace Cargo.toml) builds
# without debuginfo so per-mutant rebuilds stay fast.
profile = "mutants"

# Per-package tests only — NEVER test_workspace = true. With the workspace-wide
# test set, every mutant would re-run the ENTIRE workspace suite (including the
# slow integration tests in other crates), blowing the 20-min PR budget. Each
# mutant runs only the tests of the crate it lives in. `false` is also the
# cargo-mutants default, set here explicitly so the intent is recorded.
test_workspace = false

# Skip generated / declarative / vendored code that carries no behavior worth
# mutating:
#   - migration files (m*_create_*.rs / m*.rs): declarative schema, CLAUDE.md exempt
#   - protobuf vendor + checked-in proto descriptors (companion/protocol.rs is a
#     hand-maintained wire mapping with no branch logic to verify)
#   - build scripts: compile-time codegen, not runtime behavior
# (OUT_DIR-generated protobuf — rv.data.rs — is outside the source tree and is
#  never mutated by cargo-mutants in the first place.)
exclude_globs = [
    "crates/presenter-migration/src/m*.rs",
    "crates/presenter-importer/proto/**",
    "crates/presenter-importer/vendor/**",
    "crates/presenter-server/src/companion/protocol.rs",
    "**/build.rs",
]

# Skip mutating HARDWARE-BOUND functions that cannot be exercised by a CI unit
# test (per airuleset mutation-testing.md — hardware-bound code is legitimately
# excluded). Matched against the names shown by `cargo mutants --list`.
#   - NdiManager::start_pipeline: needs a real `NdiManager`, which only exists
#     when libndi loads (`try_new` returns None otherwise). The GitHub-hosted
#     mutation runner has no libndi, so no unit test can construct the manager or
#     drive the GStreamer/NDI pipeline this fn builds. Faking a test that didn't
#     really exercise it would be a no-op, so the mutant (lifecycle.rs:97 →
#     `Ok(())`, and the in-body match-arm mutants) is excluded here instead.
#   - NdiManagerHandle::* pure-delegation forwarders (#406 seam, ndi_control.rs):
#     these forward to the libndi-bound NdiManager (Real arm) so they are NOT
#     exercisable on a libndi-free CI host. The seam exists for the #370 reap
#     WIRING test, which exercises (and kills the mutants in) start_pipeline +
#     stop_other_pipelines via the Fake — those two are NOT excluded. The other
#     forwarders carry no CI-testable behavior; excluding them is the same
#     hardware-boundary rationale as NdiManager::start_pipeline above.
exclude_re = [
    "NdiManager::start_pipeline",
    "NdiManagerHandle::stop_pipeline",
    "NdiManagerHandle::stop_all",
    "NdiManagerHandle::discover_sources",
    "NdiManagerHandle::pipeline_snapshots",
    "NdiManagerHandle::pipeline_snapshot",
    "NdiManagerHandle::simulate_pipeline_error",
]
