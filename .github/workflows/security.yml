name: Security

on:
  push:
    branches: [dev]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================
  # Rust Security Audit
  # ============================================
  audit:
    name: Cargo Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          cargo install cargo-audit --locked || cargo install cargo-audit

      - name: Clean stale advisory database
        run: rm -rf ~/.cargo/advisory-db

      - name: Run cargo audit
        run: cargo audit --deny warnings

  # ============================================
  # Dependency Policy (cargo-deny)
  # ============================================
  deny:
    name: Cargo Deny
    runs-on: self-hosted
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: |
          cargo install cargo-deny --locked || cargo install cargo-deny

      - name: Run cargo-deny
        run: cargo deny --all-features check ${{ matrix.checks }}

  # ============================================
  # npm Audit
  # ============================================
  npm-audit:
    name: npm Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # ============================================
  # CodeQL Analysis
  # ============================================
  # NOTE: CodeQL requires "Code scanning" to be enabled in repository settings.
  # To enable: Settings > Security > Code security and analysis > Code scanning > Set up
  # Once enabled, uncomment this job.
