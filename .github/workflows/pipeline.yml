name: Pipeline

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ============================================
  # Branch Sync Check (fails fast if dev is behind main)
  # ============================================
  branch-sync:
    name: Branch Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is behind main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::Branch is $BEHIND commits behind main. Sync with main before pushing:"
            echo "::error::  git fetch origin && git merge origin/main && git push origin dev"
            exit 1
          fi
          echo "Branch is up to date with main"

  # ============================================
  # Format Check
  # ============================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================
  # Clippy Linting
  # ============================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: false

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::all

  # ============================================
  # Companion (Node.js) Tests
  # ============================================
  companion-tests:
    name: Companion Tests
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run companion tests
        run: npm run test:companion

  # ============================================
  # Version Check
  # ============================================
  version-check:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be clean semver X.Y.Z (got: $VERSION)"
            exit 1
          fi
          echo "Version $VERSION is valid semver"

      - name: Check version is increasing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if ! RELEASE_OUTPUT=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty' 2>&1); then
            echo "::error::Failed to query GitHub releases API: $RELEASE_OUTPUT"
            exit 1
          fi
          LATEST="$RELEASE_OUTPUT"

          if [ -z "$LATEST" ]; then
            echo "No previous releases found - version $VERSION is valid"
            exit 0
          fi

          LATEST="${LATEST#v}"
          echo "Current version: $VERSION"
          echo "Latest release:  $LATEST"

          HIGHER=$(printf '%s\n%s' "$LATEST" "$VERSION" | sort -V | tail -n1)

          if [ "$HIGHER" = "$LATEST" ]; then
            echo "::error::Version must be greater than latest release"
            echo "Current: $VERSION"
            echo "Latest:  $LATEST"
            echo "Please increment the version in Cargo.toml"
            exit 1
          fi

          if [ "$VERSION" = "$LATEST" ]; then
            echo "::error::Version cannot equal latest release"
            echo "Current: $VERSION"
            echo "Latest:  $LATEST"
            echo "Please increment the version in Cargo.toml"
            exit 1
          fi

          echo "Version $VERSION is greater than latest release $LATEST"

  # ============================================
  # Rust Security Audit
  # ============================================
  security-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      - name: Clean stale advisory database
        run: rm -rf ~/.cargo/advisory-db

      - name: Run cargo audit
        # Advisory ignores (incl. RUSTSEC-2026-0097 and RUSTSEC-2026-0173) live
        # in .cargo/audit.toml — the single source cargo-audit reads — each with
        # its justification. Do NOT add --ignore flags here (consolidation #366).
        run: cargo audit --deny warnings

  # ============================================
  # Dependency Policy (cargo-deny)
  # ============================================
  security-deny:
    name: Cargo Deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    needs: branch-sync
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-deny-${{ runner.os }}-

      - name: Install cargo-deny
        run: command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny --all-features check ${{ matrix.checks }}

  # ============================================
  # npm Audit
  # ============================================
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # ============================================
  # Build and Test
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm ripgrep gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: false

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features
        env:
          RUST_LOG: debug

      - name: Run doc tests
        run: cargo test --doc --workspace

      - name: Run presenter-ui unit tests (crate excluded from workspace)
        run: cargo test --lib
        working-directory: crates/presenter-ui

      - name: Run CI shell tests
        run: |
          bash tests/ci/check-dev-libraries.test.sh
          # Regression guard for #374: the function-length gate was a silent
          # no-op in scoped CI runs (abs vs. relative path comparison). This
          # self-test proves the gate FIRES on a relative-path over-cap fixture
          # and FAILS if the abs/rel bug is reintroduced.
          bash tests/ci/fn-length-gate.test.sh
          # Regression guard for #364: the placeholder/unfinished-work gate was a
          # silent no-op (ripgrep-version-fragile `**` include glob + swallowed
          # rg errors). This self-test proves the gate FIRES on a deeply-nested
          # marker, passes a clean tree, and fails loudly on a real scan error.
          bash tests/ci/placeholder-gate.test.sh

  # ============================================
  # Mutation Testing
  # ============================================
  # Diff-scoped PR gate (airuleset mutation-testing.md). Mutates ONLY the lines
  # changed in this PR vs the base branch — a REAL pass/fail gate, HARD-CAPPED at
  # 20 min. The previous full-`--workspace --shard 1/12 ... || true` job timed
  # out at its 45-min cap on every PR (#429), leaving the PR UNSTABLE. The
  # full-tree catch-up runs on demand via mutation-full.yml (`/mutation-sweep`).
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: false

      - name: Install cargo-mutants + cargo-nextest (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,cargo-nextest

      - name: Run diff-scoped mutation testing (real gate)
        run: |
          git diff origin/${{ github.base_ref || 'main' }}...HEAD > pr.diff
          cargo mutants --in-diff pr.diff --baseline=skip --test-tool=nextest --jobs 2 -- --all-targets

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results-${{ github.run_id }}
          path: mutants.out/
          retention-days: 14

  # ============================================
  # Quality Checks
  # ============================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm ripgrep jq python3 python3-yaml gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      # Regression test for #321: every workflow YAML must load under a
      # strict parser (`yaml.safe_load`). The bug was a multi-line
      # `python3 -c "..."` heredoc with content at column 1 inside a YAML
      # literal block scalar — that broke the parser and produced
      # half-registered workflows that fired phantom zero-job runs on
      # every push.
      - name: Validate workflow YAML strictness
        run: |
          set -e
          for w in .github/workflows/*.yml; do
            echo "Checking $w"
            python3 -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$w"
          done
          echo "All workflow YAML files parse strictly."

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: false

      - name: Run quality checks
        run: ./scripts/dev/quality-check.sh --strict --against origin/${{ github.base_ref || 'main' }}

  # ============================================
  # Code Coverage
  # ============================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          cache-on-failure: false

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov &>/dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --all-features \
            --codecov --output-path codecov.json

      # NOTE: Set fail_ci_if_error: true once CODECOV_TOKEN secret is configured
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Build Release Artifacts (gate: ALL checks must pass)
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - test
      - quality
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler cmake nasm gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev libva-dev intel-media-va-driver-non-free

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install nightly toolchain (WASM MVP build)
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain nightly
          rustup component add rust-src --toolchain nightly

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
          cache-on-failure: false

      - name: Cache trunk binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: trunk-${{ runner.os }}-

      - name: Install trunk
        run: command -v trunk >/dev/null 2>&1 || cargo install trunk --locked

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build WASM UI
        run: bash scripts/build-ui.sh

      - name: Build release binaries
        run: cargo build --release -p presenter-server -p presenter-importer --features presenter-server/mock-integrations,presenter-server/test-helpers
        env:
          PRESENTER_BUILD_CHANNEL: dev

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 1
          path: |
            target/release/presenter-server
            target/release/import_propresenter
            target/release/ingest_bibles

  # ============================================
  # E2E Tests (GitHub-hosted runners, 3 parallel shards)
  # ============================================
  e2e:
    name: Playwright E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs:
      - build
      - companion-tests
      - version-check
      - security-audit
      - security-deny
      - npm-audit
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/3", "2/3", "3/3"]
    steps:
      - uses: actions/checkout@v4

      - name: Install GStreamer runtime libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 libgstreamer-plugins-bad1.0-0 \
            libva-drm2 libva2

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: _artifacts

      - name: Place binaries
        run: |
          echo "=== Downloaded artifact contents ==="
          find _artifacts -type f -ls
          mkdir -p target/release
          cp _artifacts/presenter-server target/release/
          cp _artifacts/import_propresenter target/release/
          cp _artifacts/ingest_bibles target/release/
          chmod +x target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles
          ls -la target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        # `chrome` is the branded Google Chrome binary — required for video
        # codec coverage. Default Chromium lacks H.264 due to licensing, so
        # WebRTC video tracks never actually decode in tests and we can't
        # tell "video plays" from "video silently fails to decode but
        # ontrack fires". `--with-deps` also pulls system libraries the
        # branded Chrome needs (libnss, libasound, etc.). Default Chromium
        # is kept so non-video tests can still use the headless shell.
        run: npx playwright install --with-deps chromium chrome

      - name: Run Playwright tests
        # Exclude @synthetic-ndi — those need a live NDI source + GPU encoder
        # and run on the self-hosted `e2e-ndi` lane instead (this runner has
        # no NDI SDK). Without this, the required real-frame NDI test would
        # fail here for lack of a source.
        run: npx playwright test --shard=${{ matrix.shard }} --grep-invert "@synthetic-ndi" --reporter=blob
        env:
          CI: true
          PRESENTER_LIBRARY_ROOT: ${{ github.workspace }}/data/libraries
          PRESENTER_BIBLE_KJV: ${{ github.workspace }}/data/bibles/kjv.usfm.zip
          PRESENTER_BIBLE_SEB: ${{ github.workspace }}/data/bibles/seb.bbl.mybible.zip
          PRESENTER_BIBLE_ROHACEK: ${{ github.workspace }}/data/bibles/rohacek.bbl.mybible.zip
          PRESENTER_BIBLE_SEVP: ${{ github.workspace }}/data/bibles/sevp.obohu.mybible.zip
          PRESENTER_BIBLE_MILOST: ${{ github.workspace }}/data/bibles/milost.bbl.mybible.zip

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-blob-report-shard-${{ strategy.job-index }}-${{ github.run_id }}
          path: blob-report/
          retention-days: 1

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-shard-${{ strategy.job-index }}-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  # ============================================
  # NDI WebRTC E2E (self-hosted dev2: NDI SDK + NVENC + branded Chrome)
  #
  # The ubuntu `e2e` job cannot exercise the NDI→WebRTC video path (no NDI
  # SDK, no GPU encoder, no NDI source on its network), so its real-frame
  # tests skip. This REQUIRED lane closes that gap: it publishes a synthetic
  # NDI source on the LAN and asserts that actual H264 frames decode in a real
  # browser. It is the regression guard for the #336 "connected but black
  # screen" bug (broken ICE / DTLS bundle / payload-type / branch lifecycle).
  # ============================================
  e2e-ndi:
    name: NDI WebRTC E2E (synthetic, self-hosted)
    runs-on: self-hosted
    needs:
      - build
      - companion-tests
      - version-check
      - security-audit
      - security-deny
      - npm-audit
    timeout-minutes: 20
    env:
      # gst-plugin-ndi locates libndi via this var; /usr/lib/ndi is the SDK
      # install on the dev2 runner (not on the default linker path).
      NDI_RUNTIME_DIR_V6: /usr/lib/ndi
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: _artifacts

      - name: Place binaries
        # ALL three prebuilt binaries are required: the spec's beforeAll runs
        # refresh-dev-data.sh, which invokes import_propresenter + ingest_bibles.
        # If they're missing it falls back to `cargo run` (cold compile) and the
        # 180s beforeAll hook times out before any test runs.
        run: |
          mkdir -p target/release
          cp _artifacts/presenter-server target/release/
          cp _artifacts/import_propresenter target/release/
          cp _artifacts/ingest_bibles target/release/
          chmod +x target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles
          ls -la target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles

      - name: Build synthetic NDI sender (test-helpers)
        run: cargo build -p presenter-ndi --features test-helpers --bin ndi_test_sender

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright (branded Chrome for H.264)
        run: npx playwright install --with-deps chromium chrome

      - name: Start synthetic NDI sender
        # Publishes "<host> (PRESENTER-TEST)" on the LAN so the test (and the
        # presenter test-server it spawns) can discover + consume it. Runs in
        # the background; stopped in the cleanup step below.
        run: |
          PRESENTER_NDI_TEST_NAME="PRESENTER-TEST" nohup ./target/debug/ndi_test_sender > /tmp/ndi_test_sender.log 2>&1 &
          echo $! > /tmp/ndi_test_sender.pid
          # Give NDI discovery a moment to advertise the source.
          sleep 5
          cat /tmp/ndi_test_sender.log || true

      - name: Run NDI WebRTC E2E (real frames)
        run: npx playwright test --grep "@synthetic-ndi" --project chrome-video --reporter=line
        env:
          CI: true
          # Skip mock integrations (OSC/AbleSet/Resolume) in the spawned test
          # server — their FIXED localhost ports collide with the deployed
          # presenter-dev service already running on this self-hosted runner.
          # The NDI test doesn't use those mocks.
          PRESENTER_SKIP_MOCK_INTEGRATIONS: "1"
          PRESENTER_LIBRARY_ROOT: ${{ github.workspace }}/data/libraries
          PRESENTER_BIBLE_KJV: ${{ github.workspace }}/data/bibles/kjv.usfm.zip
          PRESENTER_BIBLE_SEB: ${{ github.workspace }}/data/bibles/seb.bbl.mybible.zip
          PRESENTER_BIBLE_ROHACEK: ${{ github.workspace }}/data/bibles/rohacek.bbl.mybible.zip
          PRESENTER_BIBLE_SEVP: ${{ github.workspace }}/data/bibles/sevp.obohu.mybible.zip
          PRESENTER_BIBLE_MILOST: ${{ github.workspace }}/data/bibles/milost.bbl.mybible.zip

      - name: Stop synthetic NDI sender
        if: always()
        run: |
          if [ -f /tmp/ndi_test_sender.pid ]; then
            kill "$(cat /tmp/ndi_test_sender.pid)" 2>/dev/null || true
            rm -f /tmp/ndi_test_sender.pid
          fi

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-ndi-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  # ============================================
  # Merge E2E Reports
  # ============================================
  e2e-report:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-report-shard-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html all-blob-reports

      - uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ============================================
  # Deploy to Dev (local runner — needs SSH to LAN)
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: self-hosted
    needs: [e2e, e2e-ndi]
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      DEPLOY_DIR: /opt/presenter-dev
      SERVICE_NAME: presenter-dev
      DEPLOY_HOST: 10.77.8.134
      DEPLOY_USER: newlevel
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: _artifacts

      - name: Place binaries
        run: |
          mkdir -p target/release
          cp _artifacts/presenter-server target/release/
          cp _artifacts/import_propresenter target/release/
          cp _artifacts/ingest_bibles target/release/
          chmod +x target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles
          ls -la target/release/presenter-server target/release/import_propresenter target/release/ingest_bibles

      - name: Setup SSH for deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_DEV }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan failed — known_hosts is empty. Cannot verify host."
            exit 1
          fi
          cat > ~/.ssh/config <<EOF
          Host deploy-target
              HostName ${{ env.DEPLOY_HOST }}
              User ${{ env.DEPLOY_USER }}
              IdentityFile ~/.ssh/id_deploy
          EOF

      - name: Setup SSH for production DB access
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_prod
          chmod 600 ~/.ssh/id_prod
          ssh-keyscan 10.77.9.205 >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host prod-server
              HostName 10.77.9.205
              User newlevel
              IdentityFile ~/.ssh/id_prod
          EOF

      - name: Test migration against production DB
        run: |
          set -e
          echo "Copying production database for migration testing..."
          PROD_DB="/tmp/prod-migration-test-$$.db"
          if ! scp -i ~/.ssh/id_prod prod-server:/opt/presenter/presenter.db "$PROD_DB"; then
            echo "::error::Could not copy production database from prod-server. The migration test cannot run, which means we cannot verify the new binary won't break production. Fix prod SSH access (DEPLOY_SSH_KEY secret must be installed in prod's authorized_keys) before retrying."
            exit 1
          fi
          echo "Testing new binary against production database..."
          chmod +x target/release/presenter-server
          PRESENTER_DB_URL="sqlite://$PROD_DB" PRESENTER_PORT=0 \
            timeout 10 target/release/presenter-server &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Migration works against production database"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "::error::New binary failed to start with PRODUCTION database — migration is broken. This would cause a production outage. Fix the migration before merging."
            rm -f "$PROD_DB" "${PROD_DB}-wal" "${PROD_DB}-shm"
            exit 1
          fi
          rm -f "$PROD_DB" "${PROD_DB}-wal" "${PROD_DB}-shm"

      - name: Create deploy directory
        run: |
          ssh deploy-target "sudo mkdir -p ${{ env.DEPLOY_DIR }} && sudo chown -R ${{ env.DEPLOY_USER }}:${{ env.DEPLOY_USER }} ${{ env.DEPLOY_DIR }}"

      - name: Ensure ADB is installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          if ! command -v adb &> /dev/null; then
            echo "Installing ADB..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq android-tools-adb
          fi
          echo "ADB version: $(adb --version | head -1)"
          REMOTE_SCRIPT

      - name: Ensure NDI SDK and avahi-daemon are installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          # Install avahi-daemon for mDNS (NDI source discovery)
          if ! systemctl is-active --quiet avahi-daemon 2>/dev/null; then
            echo "Installing avahi-daemon..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq avahi-daemon
            sudo systemctl enable avahi-daemon
            sudo systemctl start avahi-daemon
          fi
          # Install NDI SDK if not present
          if [ ! -f /usr/lib/ndi/libndi.so.6 ]; then
            echo "Installing NDI SDK v6..."
            NDI_URL="https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz"
            curl -sL "$NDI_URL" -o /tmp/ndi_sdk.tar.gz
            cd /tmp && tar xzf ndi_sdk.tar.gz
            echo "y" | PAGER=cat sh /tmp/Install_NDI_SDK_v6_Linux.sh
            sudo mkdir -p /usr/lib/ndi
            sudo cp "/tmp/NDI SDK for Linux/lib/x86_64-linux-gnu/libndi.so.6.3.1" /usr/lib/ndi/
            sudo ln -sf libndi.so.6.3.1 /usr/lib/ndi/libndi.so.6
            sudo ln -sf libndi.so.6 /usr/lib/ndi/libndi.so
            rm -rf /tmp/ndi_sdk.tar.gz /tmp/Install_NDI_SDK_v6_Linux.sh "/tmp/NDI SDK for Linux"
            echo "NDI SDK installed"
          else
            echo "NDI SDK already present"
          fi
          ls -la /usr/lib/ndi/libndi.so.6
          REMOTE_SCRIPT

      - name: Ensure GStreamer + VA-API are installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          NEEDED="gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice intel-media-va-driver-non-free libva-drm2 libva2"
          MISSING=""
          for pkg in $NEEDED; do
            dpkg -s "$pkg" >/dev/null 2>&1 || MISSING="$MISSING $pkg"
          done
          if [ -n "$MISSING" ]; then
            echo "Installing missing packages:$MISSING"
            sudo apt-get update -qq
            sudo apt-get install -y -qq $MISSING
          fi
          # Probe that VAAPI H264 encoder is available. On dev2 (NVIDIA) the
          # probe will fail — that's expected. We log a warning and continue.
          # The N100 production deploy (deploy.yml) keeps the hard exit-1.
          if ! gst-inspect-1.0 vah264enc >/dev/null 2>&1; then
            echo "::warning::vah264enc not available on dev target — NDI WebRTC pipeline build will fail at activation. Expected on dev2 (NVIDIA, no Intel VA-API)."
          else
            echo "vah264enc available: $(gst-inspect-1.0 vah264enc | head -1)"
          fi
          REMOTE_SCRIPT

      - name: Stop service (and clear any failed state)
        run: |
          # is-active returns true ONLY for `active`/`reloading`. A unit
          # caught mid-restart-loop reports `activating` (start-pre) or
          # `failed`, both of which used to skip the stop step. The stale
          # restart cycle then raced our `systemctl start` below — caught
          # in dev deploy 2026-05-24 after the #339 ExecStartPre rolled
          # out with a vah264enc probe that never resolved on dev2's
          # Nvidia GPU. Always stop + reset-failed so the next start runs
          # against a clean unit slate, regardless of prior state.
          ssh deploy-target "sudo systemctl stop ${{ env.SERVICE_NAME }} 2>/dev/null || true; \
                             sudo systemctl reset-failed ${{ env.SERVICE_NAME }} 2>/dev/null || true; \
                             echo 'Service stopped + failed state cleared'"

      - name: Deploy binaries
        run: |
          scp -i ~/.ssh/id_deploy \
            target/release/presenter-server \
            target/release/import_propresenter \
            target/release/ingest_bibles \
            deploy-target:${{ env.DEPLOY_DIR }}/
          ssh deploy-target "chmod +x ${{ env.DEPLOY_DIR }}/presenter-server ${{ env.DEPLOY_DIR }}/import_propresenter ${{ env.DEPLOY_DIR }}/ingest_bibles"

      - name: Deploy CLIProxyAPI
        run: |
          CLIPROXY_VERSION="6.9.1"
          CLIPROXY_URL="https://github.com/router-for-me/CLIProxyAPI/releases/download/v${CLIPROXY_VERSION}/CLIProxyAPI_${CLIPROXY_VERSION}_linux_amd64.tar.gz"
          ssh deploy-target "if [ ! -f ${{ env.DEPLOY_DIR }}/cli-proxy-api ]; then
            echo 'Downloading CLIProxyAPI v${CLIPROXY_VERSION}...'
            curl -sL '${CLIPROXY_URL}' | tar xz -C ${{ env.DEPLOY_DIR }}/
            chmod +x ${{ env.DEPLOY_DIR }}/cli-proxy-api
            echo 'CLIProxyAPI deployed'
          else
            echo 'CLIProxyAPI already present'
          fi"

      - name: Backup database
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter-dev/presenter.db"
          BACKUP_DIR="/opt/presenter-dev/backups"
          mkdir -p "$BACKUP_DIR"
          if [ -f "$DB_PATH" ] && [ -s "$DB_PATH" ]; then
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            cp "$DB_PATH" "${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
            echo "Database backed up to ${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
            ls -t "$BACKUP_DIR"/presenter-*.db 2>/dev/null | tail -n +6 | xargs -r rm --
          else
            echo "No existing database to back up"
          fi
          REMOTE_SCRIPT

      - name: Replace dev database with production snapshot
        run: |
          set -e
          echo "Fetching production database snapshot..."
          PROD_TMP="/tmp/prod-db-snapshot-$$.db"
          if ! scp -i ~/.ssh/id_prod prod-server:/opt/presenter/presenter.db "$PROD_TMP" 2>/dev/null; then
            echo "::error::Could not copy production database. Dev DB will retain its current state — this is a regression risk. Fix prod SSH access before proceeding."
            exit 1
          fi
          PROD_SIZE=$(stat -c %s "$PROD_TMP")
          if [ "$PROD_SIZE" -lt 1024 ]; then
            echo "::error::Production DB snapshot suspiciously small (${PROD_SIZE} bytes). Aborting to avoid wiping dev with garbage."
            rm -f "$PROD_TMP"
            exit 1
          fi
          echo "Production snapshot fetched (${PROD_SIZE} bytes). Uploading to dev server..."
          scp -i ~/.ssh/id_deploy "$PROD_TMP" deploy-target:/opt/presenter-dev/presenter.db.new
          rm -f "$PROD_TMP"
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          mv /opt/presenter-dev/presenter.db.new /opt/presenter-dev/presenter.db
          rm -f /opt/presenter-dev/presenter.db-wal /opt/presenter-dev/presenter.db-shm
          DB_SIZE=$(stat -c %s /opt/presenter-dev/presenter.db)
          echo "Dev database replaced with production snapshot (${DB_SIZE} bytes)"
          REMOTE_SCRIPT

      - name: Redirect integrations to mock endpoints
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          # Issue #279: prod-snapshot DB carries production-side hosts that would
          # cause dev to send commands to live hardware. Rewrite to mock endpoints
          # baked into the dev binary (--features mock-integrations). The previous
          # "Replace dev database" step guarantees the DB exists at this path.
          sqlite3 /opt/presenter-dev/presenter.db "UPDATE resolume_hosts SET host='127.0.0.1', port=8091, label=label || ' (mock)'; UPDATE ableset_settings SET host='127.0.0.1', http_port=39042; DELETE FROM android_stage_displays; DELETE FROM video_sources;"
          echo "Integration tables redirected to localhost mock endpoints"
          REMOTE_SCRIPT

      - name: Validate database schema (dev DB)
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter-dev/presenter.db"
          if [ ! -f "$DB_PATH" ] || [ ! -s "$DB_PATH" ]; then
            echo "No database - will be created on first start"
            exit 0
          fi
          echo "Validating schema compatibility with dev database..."
          TEST_DB="/tmp/presenter-dev-schema-test-$$.db"
          cp "$DB_PATH" "$TEST_DB"
          PRESENTER_DB_URL="sqlite://$TEST_DB" PRESENTER_PORT=0 \
            timeout 10 /opt/presenter-dev/presenter-server &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Schema is compatible with dev DB"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "::error::New binary failed to start with existing dev database — migration is broken."
            rm -f "$TEST_DB" "${TEST_DB}-wal" "${TEST_DB}-shm"
            exit 1
          fi
          rm -f "$TEST_DB" "${TEST_DB}-wal" "${TEST_DB}-shm"
          REMOTE_SCRIPT

      - name: Deploy Bible files
        run: |
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/bibles"
          scp -i ~/.ssh/id_deploy \
            data/bibles/kjv.usfm.zip \
            data/bibles/seb.bbl.mybible.zip \
            data/bibles/rohacek.bbl.mybible.zip \
            data/bibles/sevp.obohu.mybible.zip \
            data/bibles/milost.bbl.mybible.zip \
            deploy-target:${{ env.DEPLOY_DIR }}/bibles/

      - name: Sync ProPresenter libraries from git
        run: |
          command -v rsync >/dev/null || sudo apt-get update -qq && sudo apt-get install -y -qq rsync
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/libraries"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_deploy" \
            data/libraries/ \
            deploy-target:${{ env.DEPLOY_DIR }}/libraries/

      - name: Import ProPresenter (safety net — only if DB missing)
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter-dev/presenter.db"
          if [ ! -f "$DB_PATH" ] || [ ! -s "$DB_PATH" ]; then
            echo "No database after prod snapshot copy — falling back to ProPresenter import"
            PRESENTER_DB_URL=sqlite:///opt/presenter-dev/presenter.db \
              /opt/presenter-dev/import_propresenter --root "/opt/presenter-dev/libraries"
          else
            echo "Database present from production snapshot — skipping ProPresenter import"
          fi
          REMOTE_SCRIPT

      - name: Import Bible translations
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          echo "Importing Bible translations..."
          export PRESENTER_DB_URL=sqlite:///opt/presenter-dev/presenter.db
          export PRESENTER_BIBLE_KJV=/opt/presenter-dev/bibles/kjv.usfm.zip
          export PRESENTER_BIBLE_SEB=/opt/presenter-dev/bibles/seb.bbl.mybible.zip
          export PRESENTER_BIBLE_ROHACEK=/opt/presenter-dev/bibles/rohacek.bbl.mybible.zip
          export PRESENTER_BIBLE_SEVP=/opt/presenter-dev/bibles/sevp.obohu.mybible.zip
          export PRESENTER_BIBLE_MILOST=/opt/presenter-dev/bibles/milost.bbl.mybible.zip
          /opt/presenter-dev/ingest_bibles
          REMOTE_SCRIPT

      - name: Deploy systemd service
        run: |
          scp -i ~/.ssh/id_deploy scripts/deploy/presenter-dev.service deploy-target:/tmp/presenter-dev.service
          ssh deploy-target "sudo cp /tmp/presenter-dev.service /etc/systemd/system/ && sudo systemctl daemon-reload"

      - name: Start service
        run: |
          ssh deploy-target "sudo systemctl enable ${{ env.SERVICE_NAME }} && sudo systemctl start ${{ env.SERVICE_NAME }}"

      - name: Verify deployment
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          if ! systemctl is-active --quiet presenter-dev; then
            echo "::error::Service failed to start"
            sudo journalctl -u presenter-dev -n 50 --no-pager
            exit 1
          fi
          echo "Service is running"

          # Poll the health endpoint until the port is bound. systemd reports
          # the service active before tokio finishes binding, so a fixed sleep
          # races with cold start (DB migration + Bible/library load). 60s
          # max — beyond that something is genuinely wrong.
          HEALTH=""
          for attempt in $(seq 1 30); do
            if HEALTH=$(curl -sf http://localhost:8080/healthz 2>/dev/null); then
              break
            fi
            sleep 2
          done
          if [ -z "$HEALTH" ]; then
            echo "::error::Post-deploy health check FAILED — /healthz did not respond within 60s"
            sudo journalctl -u presenter-dev -n 50 --no-pager
            exit 1
          fi
          echo "Health check passed: $HEALTH"

          if ! LIBS=$(curl -sf http://localhost:8080/libraries/summary); then
            echo "::error::Post-deploy data check FAILED — /libraries/summary did not respond"
            exit 1
          fi
          if [ "$LIBS" = "[]" ]; then
            echo "::error::Post-deploy data check FAILED — database appears empty"
            exit 1
          fi
          DISK_COUNT=$(find /opt/presenter-dev/libraries -mindepth 1 -maxdepth 1 -type d ! -name 'LibraryData' | wc -l)
          DB_COUNT=$(printf '%s' "$LIBS" | python3 -c "import json,sys; data=json.load(sys.stdin); print(len([l for l in data if l.get('name','').strip().lower()!='bible']))")
          if [ "$DISK_COUNT" -ne "$DB_COUNT" ]; then
            echo "::error::Library count mismatch: disk=$DISK_COUNT db=$DB_COUNT (DB may be seed-only or import failed) — see issue #229"
            exit 1
          fi
          echo "Data check passed: $DB_COUNT libraries on disk match DB"
          REMOTE_SCRIPT

      - name: Post-deploy smoke test
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/stage)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Stage display returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Stage display: OK (HTTP 200)"

          curl -sf http://localhost:8080/stage/snapshot > /dev/null
          echo "Stage snapshot API: OK"

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/ui/operator)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Operator UI returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Operator UI: OK (HTTP 200)"
          REMOTE_SCRIPT

      - name: Cleanup old library paths
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          OLD_LIB_PATH="/home/newlevel/devel/presenter/presenter-libraries"
          if [ -d "$OLD_LIB_PATH" ]; then
            echo "Removing old library path: $OLD_LIB_PATH"
            rm -rf "$OLD_LIB_PATH"
          fi
          REMOTE_SCRIPT

      - name: Show deployment info
        run: |
          echo "=== Dev Deployment Complete ==="
          echo "Version: $(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          echo "Service: ${{ env.SERVICE_NAME }}"
          echo "URL: http://10.77.8.134:8080"
          ssh deploy-target "systemctl status ${{ env.SERVICE_NAME }} --no-pager" || true

      - name: Install & configure cloudflared (skipped if vars unset)
        if: ${{ vars.CLOUDFLARED_TUNNEL_ID_DEV != '' && vars.CLOUDFLARED_HOSTNAME_DEV != '' }}
        env:
          TUNNEL_TOKEN: ${{ secrets.CLOUDFLARED_CREDS_DEV }}
        run: |
          set -euo pipefail
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "::error::CLOUDFLARED_CREDS_DEV secret is empty. Register the tunnel token in repo settings."
            exit 1
          fi
          ssh deploy-target "set -euo pipefail
            if ! command -v cloudflared >/dev/null 2>&1; then
              wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -O /tmp/cf.deb
              sudo dpkg -i /tmp/cf.deb
              rm /tmp/cf.deb
            fi
            sudo cloudflared service uninstall 2>/dev/null || true
            sudo cloudflared service install ${TUNNEL_TOKEN}
            sudo systemctl enable --now cloudflared
          "

  # ============================================
  # Deploy Companion Plugin to both hosts
  # ============================================
  deploy-companion:
    name: Deploy Companion Plugin
    runs-on: self-hosted
    needs: deploy-dev
    concurrency:
      group: deploy-companion
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH for SNV (companion-snv.lan = production host)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_snv
          chmod 600 ~/.ssh/id_snv
          ssh-keyscan 10.77.9.205 >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host companion-snv
              HostName 10.77.9.205
              User newlevel
              IdentityFile ~/.ssh/id_snv
          EOF

      - name: Check companion-pp reachability
        id: pp_check
        run: |
          if ssh-keyscan -T 5 companion-pp.lan 2>/dev/null | grep -q '^companion-pp.lan'; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "companion-pp.lan is reachable"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::companion-pp.lan unreachable — skipping PP deploy. SNV deploy continues."
          fi

      - name: Setup SSH for PP (companion-pp.lan)
        if: steps.pp_check.outputs.reachable == 'true'
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY_PP }}" > ~/.ssh/id_pp
          chmod 600 ~/.ssh/id_pp
          ssh-keyscan companion-pp.lan >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host companion-pp
              HostName companion-pp.lan
              User newlevel
              IdentityFile ~/.ssh/id_pp
          EOF

      - name: Deploy to companion-snv.lan
        run: |
          MODULE_DIR="/home/companion/.config/companion-nodejs/modules/presenter"
          STAGE_DIR=$(ssh companion-snv "mktemp -d /tmp/companion-module-XXXXXX")
          echo "Deploying Companion plugin to companion-snv.lan (staging: $STAGE_DIR)..."
          scp -r ops/companion/presenter/* companion-snv:$STAGE_DIR/
          ssh companion-snv "cd $STAGE_DIR && npm install --omit=dev"
          ssh companion-snv "sudo rm -rf $MODULE_DIR && sudo mkdir -p $(dirname $MODULE_DIR) && sudo mv $STAGE_DIR $MODULE_DIR && sudo chown -R companion:companion $MODULE_DIR"
          echo "Restarting Companion on SNV..."
          ssh companion-snv "sudo systemctl restart companion"
          sleep 5
          ssh companion-snv "systemctl is-active companion" || { echo "::error::Companion failed to restart on SNV"; exit 1; }
          echo "Companion plugin deployed to companion-snv.lan"

      - name: Deploy to companion-pp.lan
        if: steps.pp_check.outputs.reachable == 'true'
        run: |
          # companion-pp now runs the CompanionPi (Raspberry-Pi-style) build,
          # not Docker. Modules go in --extra-module-path /opt/companion-module-dev,
          # service is the systemd unit "companion", run as user "companion".
          MODULE_DIR="/opt/companion-module-dev/presenter"
          STAGE_DIR=$(ssh companion-pp "mktemp -d /tmp/companion-module-XXXXXX")
          echo "Deploying Companion plugin to companion-pp.lan (staging: $STAGE_DIR)..."
          scp -r ops/companion/presenter/* companion-pp:$STAGE_DIR/
          ssh companion-pp "cd $STAGE_DIR && npm install --omit=dev"
          ssh companion-pp "sudo rm -rf $MODULE_DIR && sudo mkdir -p $(dirname $MODULE_DIR) && sudo mv $STAGE_DIR $MODULE_DIR && sudo chown -R companion:companion $MODULE_DIR"
          echo "Restarting Companion on PP..."
          ssh companion-pp "sudo systemctl restart companion"
          sleep 5
          ssh companion-pp "systemctl is-active companion" || { echo "::error::Companion failed to restart on PP"; exit 1; }
          echo "Companion plugin deployed to companion-pp.lan"

      - name: Show deployment info
        run: |
          VERSION=$(node -e "console.log(require('./ops/companion/presenter/package.json').version)")
          echo "=== Companion Plugin Deployment Complete ==="
          echo "Version: $VERSION"
          if [ "${{ steps.pp_check.outputs.reachable }}" = "true" ]; then
            echo "Deployed to: companion-snv.lan, companion-pp.lan"
          else
            echo "Deployed to: companion-snv.lan"
            echo "Skipped: companion-pp.lan (unreachable at job start)"
          fi
