name: E2E Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PRESENTER_PORT: 8899
  PRESENTER_DB_URL: sqlite://presenter_e2e.db

jobs:
  playwright:
    name: Playwright E2E
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Build presenter-server
        run: cargo build --release -p presenter-server

      - name: Setup test database
        run: |
          ./scripts/dev/refresh-dev-data.sh || true

      - name: Start server in background
        run: |
          ./target/release/presenter-server &
          echo $! > /tmp/presenter.pid
          # Wait for server to be ready
          timeout 60 bash -c 'until curl -s http://127.0.0.1:${{ env.PRESENTER_PORT }}/healthz; do sleep 1; done'
        env:
          PRESENTER_PORT: ${{ env.PRESENTER_PORT }}
          PRESENTER_DB_URL: ${{ env.PRESENTER_DB_URL }}
          RUST_LOG: presenter_server=info

      - name: Run Playwright tests
        run: npm run test:playwright
        env:
          CI: true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/presenter.pid ]; then
            kill $(cat /tmp/presenter.pid) || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
