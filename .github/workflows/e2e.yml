name: E2E Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Docker runners have test data copied into the image
  PRESENTER_LIBRARY_ROOT: /home/runner/presenter-libraries

jobs:
  # ============================================
  # Version Check (gate - fails fast before any builds)
  # ============================================
  version-check:
    name: Version Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Version: $VERSION"
          if [[ "$GITHUB_REF" == refs/heads/dev ]]; then
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
              echo "::error::Dev branch version must match X.Y.Z-dev.N (got: $VERSION)"
              exit 1
            fi
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Main branch version must be clean X.Y.Z (got: $VERSION)"
              exit 1
            fi
          fi
          echo "Version $VERSION is valid"

  playwright:
    name: Playwright E2E
    runs-on: self-hosted
    needs: version-check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clean stale build artifacts
        run: rm -rf target

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Build binaries
        run: |
          cargo build -p presenter-server
          cargo build -p presenter-importer

      - name: Run Playwright tests
        run: npm run test:playwright
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 7
