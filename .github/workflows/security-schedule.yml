name: Security (Scheduled)

on:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      - name: Clean stale advisory database
        run: rm -rf ~/.cargo/advisory-db

      - name: Run cargo audit
        run: cargo audit --deny warnings

  deny:
    name: Cargo Deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-deny-${{ runner.os }}-

      - name: Install cargo-deny
        run: command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny --all-features check ${{ matrix.checks }}

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
