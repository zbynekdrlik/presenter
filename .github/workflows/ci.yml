name: CI

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ============================================
  # Branch Sync Check (fails fast if dev is behind main)
  # ============================================
  branch-sync:
    name: Branch Sync Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is behind main
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::Branch is $BEHIND commits behind main. Sync with main before pushing:"
            echo "::error::  git fetch origin && git merge origin/main && git push origin dev"
            exit 1
          fi
          echo "Branch is up to date with main"

  # ============================================
  # Format Check (fast, runs first)
  # ============================================
  fmt:
    name: Format
    runs-on: self-hosted
    needs: branch-sync
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================
  # Clippy Linting
  # ============================================
  clippy:
    name: Clippy
    runs-on: self-hosted
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clean stale build artifacts
        run: rm -rf target

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-on-failure: false

      - name: Validate restored cache
        run: |
          if [ -d target ] && find target -name '*.d' -print -quit 2>/dev/null | grep -q .; then
            sample=$(find target -name '*.d' -print -quit)
            dep=$(head -1 "$sample" 2>/dev/null | tr -d ':')
            if [ -n "$dep" ] && [ ! -e "$dep" ]; then
              echo "::warning::Stale cache detected, cleaning target"
              rm -rf target
            fi
          fi

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::all

  # ============================================
  # Build and Test (Single Toolchain)
  # ============================================
  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clean stale build artifacts
        run: rm -rf target

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-on-failure: false

      - name: Validate restored cache
        run: |
          if [ -d target ] && find target -name '*.d' -print -quit 2>/dev/null | grep -q .; then
            sample=$(find target -name '*.d' -print -quit)
            dep=$(head -1 "$sample" 2>/dev/null | tr -d ':')
            if [ -n "$dep" ] && [ ! -e "$dep" ]; then
              echo "::warning::Stale cache detected, cleaning target"
              rm -rf target
            fi
          fi

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features
        env:
          RUST_LOG: debug

      - name: Run doc tests
        run: cargo test --doc --workspace

  # ============================================
  # Quality Checks (matches scripts/dev/quality-check.sh)
  # ============================================
  quality:
    name: Quality Checks
    runs-on: self-hosted
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clean stale build artifacts
        run: rm -rf target

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality
          cache-on-failure: false

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq python3

      - name: Run quality checks
        run: ./scripts/dev/quality-check.sh --strict --against origin/${{ github.base_ref || 'main' }}

  # ============================================
  # Companion (Node.js) Tests
  # ============================================
  companion-tests:
    name: Companion Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run companion tests
        run: npm run test:companion

  # ============================================
  # Coverage Report
  # ============================================
  coverage:
    name: Code Coverage
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Clean stale build artifacts
        run: rm -rf target

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          cache-on-failure: false

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov &>/dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --all-features \
            --codecov --output-path codecov.json

      # NOTE: Set fail_ci_if_error: true once CODECOV_TOKEN secret is configured
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: codecov.json
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
