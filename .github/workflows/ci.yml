name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ============================================
  # Format Check (fast, runs first)
  # ============================================
  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================
  # Clippy Linting
  # ============================================
  clippy:
    name: Clippy
    runs-on: self-hosted
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  # ============================================
  # Build and Test (Single job for self-hosted runner efficiency)
  # ============================================
  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Build and test
        run: cargo test --workspace --all-features --no-fail-fast
        env:
          RUST_LOG: debug

  # ============================================
  # MSRV Check (ensures minimum Rust version compatibility)
  # ============================================
  msrv:
    name: MSRV (1.85)
    needs: [fmt]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Check MSRV compatibility
        run: cargo check --workspace --all-features

  # ============================================
  # Quality Checks (code patterns, file sizes, hygiene)
  # ============================================
  quality:
    name: Quality Checks
    runs-on: self-hosted
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq python3

      - name: Run quality checks
        run: ./scripts/dev/quality-check.sh --strict --against origin/${{ github.base_ref || 'main' }}

  # ============================================
  # Security Audit (fast dependency vulnerability check)
  # ============================================
  security:
    name: Security Audit
    runs-on: self-hosted
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}

  # ============================================
  # Companion (Node.js) Tests
  # ============================================
  companion-tests:
    name: Companion Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run companion tests
        run: npm run test:companion

  # ============================================
  # Docker Build Test (main branch only)
  # ============================================
  docker:
    name: Docker Build
    runs-on: self-hosted
    needs: [test, quality]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: presenter:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
