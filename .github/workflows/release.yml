name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # libglib2.0-dev + libgstreamer1.0-dev are required to compile
        # `glib-sys` / `gstreamer-sys` (pulled in via gst-plugins-rs by the
        # NDI WebRTC pipeline). Without them the build fails with
        #   "Package 'glib-2.0', required by 'virtual:world', not found"
        # at the glib-sys build script.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            protobuf-compiler cmake nasm \
            libglib2.0-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install nightly toolchain (WASM MVP build)
        run: |
          rustup toolchain install nightly --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain nightly
          rustup component add rust-src --toolchain nightly

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
          cache-on-failure: false

      - name: Cache trunk binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: trunk-${{ runner.os }}-

      - name: Install trunk
        run: command -v trunk >/dev/null 2>&1 || cargo install trunk --locked

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Build WASM UI
        run: bash scripts/build-ui.sh

      - name: Build release binaries
        run: cargo build --release -p presenter-server -p presenter-importer
        env:
          PRESENTER_BUILD_CHANNEL: release

      - name: Verify prod artifact has no test-only features
        run: |
          if strings target/release/presenter-server | grep -E "mock_integrations|MOCK_RESOLUME_ADDR|MOCK_ABLESET_ADDR|mock-resolume|mock-ableset|kill_pipeline_for_test|simulate_error_for_test|simulate_pipeline_error" >/dev/null; then
            echo "::error::Prod build contains test-only symbols (mock-integrations or test-helpers). Rebuild without --features mock-integrations,test-helpers."
            exit 1
          fi
          echo "Prod artifact verified: no test-only symbols"

      - name: Create release archive
        run: |
          mkdir -p release/bibles release/libraries
          cp target/release/presenter-server release/
          cp target/release/import_propresenter release/
          cp target/release/ingest_bibles release/
          cp data/bibles/*.zip release/bibles/
          cp -r data/libraries/* release/libraries/
          tar -czvf presenter-${{ github.event.release.tag_name }}-linux-x64.tar.gz -C release .

      - name: Upload release artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: presenter-${{ github.event.release.tag_name }}-linux-x64.tar.gz

      - name: Upload binaries for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          retention-days: 1
          path: |
            target/release/presenter-server
            target/release/import_propresenter
            target/release/ingest_bibles

  deploy-pp:
    name: Deploy to companion-pp.lan
    needs: build-release
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /opt/presenter
      SERVICE_NAME: presenter
      DEPLOY_HOST: companion-pp.lan
      DEPLOY_USER: newlevel
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: binaries

      - name: Setup SSH for deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_PP }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan failed — known_hosts is empty. Cannot verify host."
            exit 1
          fi
          cat > ~/.ssh/config <<EOF
          Host deploy-target
              HostName ${{ env.DEPLOY_HOST }}
              User ${{ env.DEPLOY_USER }}
              IdentityFile ~/.ssh/id_deploy
          EOF

      - name: Create deploy directory
        run: |
          ssh deploy-target "sudo mkdir -p ${{ env.DEPLOY_DIR }} && sudo chown -R ${{ env.DEPLOY_USER }}:${{ env.DEPLOY_USER }} ${{ env.DEPLOY_DIR }}"

      - name: Ensure ADB is installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          if ! command -v adb &> /dev/null; then
            echo "Installing ADB..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq android-tools-adb
          fi
          echo "ADB version: $(adb --version | head -1)"
          REMOTE_SCRIPT

      - name: Stop service (if running)
        run: |
          ssh deploy-target "if systemctl is-active --quiet ${{ env.SERVICE_NAME }}; then sudo systemctl stop ${{ env.SERVICE_NAME }}; echo 'Service stopped'; else echo 'Service not running'; fi"

      - name: Deploy binaries
        run: |
          scp -i ~/.ssh/id_deploy \
            binaries/presenter-server \
            binaries/import_propresenter \
            binaries/ingest_bibles \
            deploy-target:${{ env.DEPLOY_DIR }}/
          ssh deploy-target "chmod +x ${{ env.DEPLOY_DIR }}/presenter-server ${{ env.DEPLOY_DIR }}/import_propresenter ${{ env.DEPLOY_DIR }}/ingest_bibles"

      - name: Deploy CLIProxyAPI
        run: |
          CLIPROXY_VERSION="6.9.1"
          CLIPROXY_URL="https://github.com/router-for-me/CLIProxyAPI/releases/download/v${CLIPROXY_VERSION}/CLIProxyAPI_${CLIPROXY_VERSION}_linux_amd64.tar.gz"
          ssh deploy-target "if [ ! -f ${{ env.DEPLOY_DIR }}/cli-proxy-api ]; then
            echo 'Downloading CLIProxyAPI v${CLIPROXY_VERSION}...'
            curl -sL '${CLIPROXY_URL}' | tar xz -C ${{ env.DEPLOY_DIR }}/
            chmod +x ${{ env.DEPLOY_DIR }}/cli-proxy-api
            echo 'CLIProxyAPI deployed'
          else
            echo 'CLIProxyAPI already present'
          fi"

      - name: Ensure NDI SDK and avahi-daemon are installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          # Install avahi-daemon for mDNS (NDI source discovery)
          if ! systemctl is-active --quiet avahi-daemon 2>/dev/null; then
            echo "Installing avahi-daemon..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq avahi-daemon
            sudo systemctl enable avahi-daemon
            sudo systemctl start avahi-daemon
          fi
          # Install NDI SDK if not present (#278)
          if [ ! -f /usr/lib/ndi/libndi.so.6 ]; then
            echo "Installing NDI SDK v6..."
            NDI_URL="https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz"
            curl -sL "$NDI_URL" -o /tmp/ndi_sdk.tar.gz
            cd /tmp && tar xzf ndi_sdk.tar.gz
            echo "y" | PAGER=cat sh /tmp/Install_NDI_SDK_v6_Linux.sh
            sudo mkdir -p /usr/lib/ndi
            sudo cp "/tmp/NDI SDK for Linux/lib/x86_64-linux-gnu/libndi.so.6.3.1" /usr/lib/ndi/
            sudo ln -sf libndi.so.6.3.1 /usr/lib/ndi/libndi.so.6
            sudo ln -sf libndi.so.6 /usr/lib/ndi/libndi.so
            rm -rf /tmp/ndi_sdk.tar.gz /tmp/Install_NDI_SDK_v6_Linux.sh "/tmp/NDI SDK for Linux"
            echo "NDI SDK installed"
          else
            echo "NDI SDK already present"
          fi
          ls -la /usr/lib/ndi/libndi.so.6
          REMOTE_SCRIPT

      - name: Ensure GStreamer + VA-API are installed
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          NEEDED="gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-vaapi gstreamer1.0-libav gstreamer1.0-nice intel-media-va-driver-non-free libva-drm2 libva2"
          MISSING=""
          for pkg in $NEEDED; do
            dpkg -s "$pkg" >/dev/null 2>&1 || MISSING="$MISSING $pkg"
          done
          if [ -n "$MISSING" ]; then
            echo "Installing missing packages:$MISSING"
            sudo apt-get update -qq
            sudo apt-get install -y -qq $MISSING
          fi
          # Probe that VAAPI H264 encoder is available
          if ! gst-inspect-1.0 vah264enc >/dev/null 2>&1; then
            echo "::error::vah264enc element not available after install — VA-API driver missing or kernel/firmware mismatch"
            exit 1
          fi
          echo "vah264enc available: $(gst-inspect-1.0 vah264enc | head -1)"
          REMOTE_SCRIPT

      - name: Backup database
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter/presenter.db"
          BACKUP_DIR="/opt/presenter/backups"
          mkdir -p "$BACKUP_DIR"
          if [ -f "$DB_PATH" ] && [ -s "$DB_PATH" ]; then
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            cp "$DB_PATH" "${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
            echo "Database backed up to ${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
            ls -t "$BACKUP_DIR"/presenter-*.db 2>/dev/null | tail -n +6 | xargs -r rm --
          else
            echo "No existing database to back up"
          fi
          REMOTE_SCRIPT

      - name: Validate database schema
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter/presenter.db"
          if [ ! -f "$DB_PATH" ] || [ ! -s "$DB_PATH" ]; then
            echo "No database - will be created on first start"
            exit 0
          fi
          echo "Validating schema compatibility with new binary..."
          TEST_DB="/tmp/presenter-pp-schema-test-$$.db"
          cp "$DB_PATH" "$TEST_DB"
          PRESENTER_DB_URL="sqlite://$TEST_DB" PRESENTER_PORT=0 \
            timeout 10 /opt/presenter/presenter-server &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Schema is compatible"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "::warning::New binary failed to start with existing database. Database preserved - manual migration may be needed."
          fi
          rm -f "$TEST_DB" "${TEST_DB}-wal" "${TEST_DB}-shm"
          REMOTE_SCRIPT

      - name: Deploy Bible files
        run: |
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/bibles"
          scp -i ~/.ssh/id_deploy \
            data/bibles/kjv.usfm.zip \
            data/bibles/seb.bbl.mybible.zip \
            data/bibles/rohacek.bbl.mybible.zip \
            data/bibles/sevp.obohu.mybible.zip \
            data/bibles/milost.bbl.mybible.zip \
            deploy-target:${{ env.DEPLOY_DIR }}/bibles/

      - name: Sync ProPresenter libraries from git
        run: |
          command -v rsync >/dev/null || sudo apt-get update -qq && sudo apt-get install -y -qq rsync
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/libraries"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_deploy" \
            data/libraries/ \
            deploy-target:${{ env.DEPLOY_DIR }}/libraries/

      - name: Import ProPresenter (first deploy or schema reset)
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="/opt/presenter/presenter.db"
          if [ ! -f "$DB_PATH" ] || [ ! -s "$DB_PATH" ]; then
            echo "Fresh database - running ProPresenter import"
            PRESENTER_DB_URL=sqlite:///opt/presenter/presenter.db \
              /opt/presenter/import_propresenter --root "/opt/presenter/libraries"
          else
            echo "Existing database found - preserving presentations"
          fi
          REMOTE_SCRIPT

      - name: Import Bible translations
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          echo "Importing Bible translations..."
          export PRESENTER_DB_URL=sqlite:///opt/presenter/presenter.db
          export PRESENTER_BIBLE_KJV=/opt/presenter/bibles/kjv.usfm.zip
          export PRESENTER_BIBLE_SEB=/opt/presenter/bibles/seb.bbl.mybible.zip
          export PRESENTER_BIBLE_ROHACEK=/opt/presenter/bibles/rohacek.bbl.mybible.zip
          export PRESENTER_BIBLE_SEVP=/opt/presenter/bibles/sevp.obohu.mybible.zip
          export PRESENTER_BIBLE_MILOST=/opt/presenter/bibles/milost.bbl.mybible.zip
          /opt/presenter/ingest_bibles
          REMOTE_SCRIPT

      - name: Deploy systemd service
        run: |
          scp -i ~/.ssh/id_deploy scripts/deploy/presenter.service deploy-target:/tmp/presenter.service
          ssh deploy-target "sudo cp /tmp/presenter.service /etc/systemd/system/ && sudo systemctl daemon-reload"

      - name: Start service
        run: |
          ssh deploy-target "sudo systemctl enable ${{ env.SERVICE_NAME }} && sudo systemctl start ${{ env.SERVICE_NAME }}"

      - name: Verify deployment
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          if ! systemctl is-active --quiet presenter; then
            echo "::error::Service failed to start"
            sudo journalctl -u presenter -n 50 --no-pager
            exit 1
          fi
          echo "Service is running"

          # Poll /healthz until the port is bound. systemd reports the service
          # active before tokio finishes binding; a fixed sleep raced with
          # cold start. 60s max.
          HEALTH=""
          for attempt in $(seq 1 30); do
            if HEALTH=$(curl -sf http://localhost:80/healthz 2>/dev/null); then
              break
            fi
            sleep 2
          done
          if [ -z "$HEALTH" ]; then
            echo "::error::Post-deploy health check FAILED — /healthz did not respond within 60s"
            sudo journalctl -u presenter -n 50 --no-pager
            exit 1
          fi
          echo "Health check passed: $HEALTH"

          if ! LIBS=$(curl -sf http://localhost:80/libraries/summary); then
            echo "::error::Post-deploy data check FAILED — /libraries/summary did not respond"
            exit 1
          fi
          if [ "$LIBS" = "[]" ]; then
            echo "::error::Post-deploy data check FAILED — database appears empty"
            exit 1
          fi
          echo "Data check passed: libraries endpoint returned data"
          REMOTE_SCRIPT

      - name: Post-deploy smoke test
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/stage)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Stage display returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Stage display: OK (HTTP 200)"

          curl -sf http://localhost:80/stage/snapshot > /dev/null
          echo "Stage snapshot API: OK"

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/ui/operator)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Operator UI returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Operator UI: OK (HTTP 200)"
          REMOTE_SCRIPT

      - name: Show deployment info
        run: |
          echo "=== Deployment to companion-pp.lan Complete ==="
          echo "Release: ${{ github.event.release.tag_name }}"
          echo "Service: ${{ env.SERVICE_NAME }}"
          ssh deploy-target "systemctl status ${{ env.SERVICE_NAME }} --no-pager" || true

      - name: Install & configure cloudflared (skipped if vars unset)
        if: ${{ vars.CLOUDFLARED_TUNNEL_ID_PP != '' && vars.CLOUDFLARED_HOSTNAME_PP != '' }}
        env:
          TUNNEL_TOKEN: ${{ secrets.CLOUDFLARED_CREDS_PP }}
        run: |
          set -euo pipefail
          if [ -z "$TUNNEL_TOKEN" ]; then
            echo "::error::CLOUDFLARED_CREDS_PP secret is empty. Register the tunnel token in repo settings."
            exit 1
          fi
          ssh deploy-target "set -euo pipefail
            if ! command -v cloudflared >/dev/null 2>&1; then
              wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -O /tmp/cf.deb
              sudo dpkg -i /tmp/cf.deb
              rm /tmp/cf.deb
            fi
            sudo cloudflared service uninstall 2>/dev/null || true
            sudo cloudflared service install ${TUNNEL_TOKEN}
            sudo systemctl enable --now cloudflared
          "
