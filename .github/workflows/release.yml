name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p presenter-server

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/presenter-server release/
          cp target/release/import_propresenter release/ || true
          cp target/release/ingest_bibles release/ || true
          tar -czvf presenter-${{ github.event.release.tag_name }}-linux-x64.tar.gz -C release .

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: presenter-${{ github.event.release.tag_name }}-linux-x64.tar.gz
