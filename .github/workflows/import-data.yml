name: Import Data
# Manual trigger only — workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - production
          - pp
      import_type:
        description: "What to import"
        required: true
        type: choice
        options:
          - all
          - propresenter
          - bibles
      purge:
        description: "Purge existing data before import (WARNING: destroys playlists)"
        required: false
        type: boolean
        default: false

jobs:
  import:
    # Static job name — templated names with empty `${{ inputs.* }}`
    # interpolation on non-dispatch events historically confused GitHub's
    # workflow scheduler and produced zero-job phantom runs (#321).
    name: Import Data
    runs-on: self-hosted
    # Only run when manually triggered - guard against accidental triggers
    if: github.event_name == 'workflow_dispatch'
    # Concurrency stays job-scoped — workflow-scoped concurrency would
    # evaluate `${{ inputs.environment }}` on every event (including
    # push events that never run the job), reintroducing template-eval
    # fragility. Don't lift this back up.
    concurrency:
      group: import-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "deploy_dir=/opt/presenter" >> "$GITHUB_OUTPUT"
            echo "deploy_host=10.77.9.205" >> "$GITHUB_OUTPUT"
            echo "service_name=presenter" >> "$GITHUB_OUTPUT"
            echo "ssh_key_secret=DEPLOY_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "health_port=80" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.environment }}" = "pp" ]; then
            echo "deploy_dir=/opt/presenter" >> "$GITHUB_OUTPUT"
            echo "deploy_host=companion-pp.lan" >> "$GITHUB_OUTPUT"
            echo "service_name=presenter" >> "$GITHUB_OUTPUT"
            echo "ssh_key_secret=DEPLOY_SSH_KEY_PP" >> "$GITHUB_OUTPUT"
            echo "health_port=80" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_dir=/opt/presenter-dev" >> "$GITHUB_OUTPUT"
            echo "deploy_host=10.77.8.134" >> "$GITHUB_OUTPUT"
            echo "service_name=presenter-dev" >> "$GITHUB_OUTPUT"
            echo "ssh_key_secret=DEPLOY_SSH_KEY_DEV" >> "$GITHUB_OUTPUT"
            echo "health_port=8080" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          elif [ "${{ inputs.environment }}" = "pp" ]; then
            echo "${{ secrets.DEPLOY_SSH_KEY_PP }}" > ~/.ssh/id_deploy
          else
            echo "${{ secrets.DEPLOY_SSH_KEY_DEV }}" > ~/.ssh/id_deploy
          fi
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan ${{ steps.env.outputs.deploy_host }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host deploy-target
              HostName ${{ steps.env.outputs.deploy_host }}
              User newlevel
              IdentityFile ~/.ssh/id_deploy
          EOF

      - name: Backup database
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          DB_PATH="${{ steps.env.outputs.deploy_dir }}/presenter.db"
          BACKUP_DIR="${{ steps.env.outputs.deploy_dir }}/backups"
          mkdir -p "$BACKUP_DIR"
          if [ -f "$DB_PATH" ] && [ -s "$DB_PATH" ]; then
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            cp "$DB_PATH" "${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
            echo "Database backed up to ${BACKUP_DIR}/presenter-${TIMESTAMP}.db"
          else
            echo "No existing database to back up"
          fi
          REMOTE_SCRIPT

      - name: Stop service
        run: |
          ssh deploy-target "if systemctl is-active --quiet ${{ steps.env.outputs.service_name }}; then sudo systemctl stop ${{ steps.env.outputs.service_name }}; echo 'Service stopped'; else echo 'Service not running'; fi"

      - name: Sync ProPresenter libraries from git
        if: inputs.import_type == 'all' || inputs.import_type == 'propresenter'
        run: |
          command -v rsync >/dev/null || sudo apt-get update -qq && sudo apt-get install -y -qq rsync
          ssh deploy-target "mkdir -p ${{ steps.env.outputs.deploy_dir }}/libraries"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_deploy" \
            data/libraries/ \
            deploy-target:${{ steps.env.outputs.deploy_dir }}/libraries/

      - name: Import ProPresenter libraries
        if: inputs.import_type == 'all' || inputs.import_type == 'propresenter'
        run: |
          KEEP_FLAG=""
          if [ "${{ inputs.purge }}" != "true" ]; then
            KEEP_FLAG="--keep"
          fi
          DEPLOY_DIR="${{ steps.env.outputs.deploy_dir }}"
          ssh deploy-target "set -e; echo 'Importing ProPresenter libraries (purge=${{ inputs.purge }})...'; PRESENTER_DB_URL=sqlite://${DEPLOY_DIR}/presenter.db ${DEPLOY_DIR}/import_propresenter --root '${DEPLOY_DIR}/libraries' ${KEEP_FLAG}"

      - name: Import Bible translations
        if: inputs.import_type == 'all' || inputs.import_type == 'bibles'
        run: |
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          echo "Importing Bible translations..."

          BIBLES_DIR="${{ steps.env.outputs.deploy_dir }}/bibles"
          ROHACEK_PATH="$BIBLES_DIR/rohacek.bbl.mybible.zip"
          MILOST_PATH="$BIBLES_DIR/milost.bbl.mybible.zip"

          sudo mkdir -p "$BIBLES_DIR"

          # Clean up any invalid zip files from previous failed attempts
          for f in "$ROHACEK_PATH" "$MILOST_PATH"; do
            if [ -f "$f" ]; then
              if ! unzip -t "$f" >/dev/null 2>&1; then
                echo "Removing invalid zip file: $f"
                sudo rm -f "$f"
              fi
            fi
          done

          # Look for Roháček MySword file in /tmp (might be .mybible or roh.bbl.mybible)
          for f in /tmp/roh.bbl.mybible /tmp/*[Rr]ohac*.mybible /tmp/*[Rr]ohac*.bbl.mybible; do
            if [ -f "$f" ] && [ ! -f "$ROHACEK_PATH" ]; then
              echo "Found Roháček at $f - creating zip archive..."
              BASENAME=$(basename "$f")
              python3 -c "import zipfile, sys; z=zipfile.ZipFile('$ROHACEK_PATH','w',zipfile.ZIP_DEFLATED); z.write('$f','$BASENAME'); z.close(); print('Created $ROHACEK_PATH')"
              sudo chmod 644 "$ROHACEK_PATH"
              break
            fi
          done

          # Look for Milosť MySword file in /tmp
          for f in /tmp/milost.bbl.mybible /tmp/*[Mm]ilos*.mybible /tmp/*[Mm]ilos*.bbl.mybible; do
            if [ -f "$f" ] && [ ! -f "$MILOST_PATH" ]; then
              echo "Found Milosť at $f - creating zip archive..."
              BASENAME=$(basename "$f")
              python3 -c "import zipfile, sys; z=zipfile.ZipFile('$MILOST_PATH','w',zipfile.ZIP_DEFLATED); z.write('$f','$BASENAME'); z.close(); print('Created $MILOST_PATH')"
              sudo chmod 644 "$MILOST_PATH"
              break
            fi
          done

          BIBLE_DIR="${{ steps.env.outputs.deploy_dir }}/bibles"
          export PRESENTER_DB_URL=sqlite://${{ steps.env.outputs.deploy_dir }}/presenter.db

          if [ -f "$BIBLE_DIR/kjv.usfm.zip" ]; then
            export PRESENTER_BIBLE_KJV="$BIBLE_DIR/kjv.usfm.zip"
            echo "Using KJV USFM file"
          fi

          if [ -f "$BIBLE_DIR/seb.bbl.mybible.zip" ]; then
            export PRESENTER_BIBLE_SEB="$BIBLE_DIR/seb.bbl.mybible.zip"
            echo "Using SEB MySword file"
          fi

          if [ -f "$ROHACEK_PATH" ]; then
            export PRESENTER_BIBLE_ROHACEK="$ROHACEK_PATH"
            echo "Using Roháček MySword file at $ROHACEK_PATH"
          fi

          if [ -f "$BIBLE_DIR/sevp.obohu.mybible.zip" ]; then
            export PRESENTER_BIBLE_SEVP="$BIBLE_DIR/sevp.obohu.mybible.zip"
            echo "Using SEVP Obohu file"
          fi

          if [ -f "$MILOST_PATH" ]; then
            export PRESENTER_BIBLE_MILOST="$MILOST_PATH"
            echo "Using Milosť MySword file at $MILOST_PATH"
          fi

          ${{ steps.env.outputs.deploy_dir }}/ingest_bibles
          REMOTE_SCRIPT

      - name: Start service
        run: |
          ssh deploy-target "sudo systemctl start ${{ steps.env.outputs.service_name }}"

      - name: Verify health
        run: |
          sleep 5
          ssh deploy-target << 'REMOTE_SCRIPT'
          set -e
          if ! systemctl is-active --quiet ${{ steps.env.outputs.service_name }}; then
            echo "::error::Service failed to start"
            sudo journalctl -u ${{ steps.env.outputs.service_name }} -n 50 --no-pager
            exit 1
          fi
          echo "Service is running"

          HEALTH=$(curl -sf http://localhost:${{ steps.env.outputs.health_port }}/healthz)
          if [ $? -ne 0 ]; then
            echo "::error::Post-import health check FAILED"
            sudo journalctl -u ${{ steps.env.outputs.service_name }} -n 50 --no-pager
            exit 1
          fi
          echo "Health check passed: $HEALTH"
          REMOTE_SCRIPT
