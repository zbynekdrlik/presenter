name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DEPLOY_DIR: /opt/presenter
  SERVICE_NAME: presenter
  PRESENTER_LIBRARY_ROOT: /home/newlevel/devel/presenter/presenter-libraries

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release binaries
        run: cargo build --release -p presenter-server -p presenter-importer

      - name: Create deploy directory
        run: |
          sudo mkdir -p ${{ env.DEPLOY_DIR }}
          sudo chown newlevel:newlevel ${{ env.DEPLOY_DIR }}

      - name: Stop service (if running)
        run: |
          if systemctl is-active --quiet ${{ env.SERVICE_NAME }}; then
            sudo systemctl stop ${{ env.SERVICE_NAME }}
            echo "Service stopped"
          else
            echo "Service not running"
          fi

      - name: Deploy binaries
        run: |
          sudo cp target/release/presenter-server ${{ env.DEPLOY_DIR }}/
          sudo cp target/release/import_propresenter ${{ env.DEPLOY_DIR }}/
          sudo cp target/release/ingest_bibles ${{ env.DEPLOY_DIR }}/
          sudo chmod +x ${{ env.DEPLOY_DIR }}/presenter-server
          sudo chmod +x ${{ env.DEPLOY_DIR }}/import_propresenter
          sudo chmod +x ${{ env.DEPLOY_DIR }}/ingest_bibles

      - name: Import data (fresh database)
        run: |
          echo "Resetting database..."
          rm -f ${{ env.DEPLOY_DIR }}/presenter.db ${{ env.DEPLOY_DIR }}/presenter.db-shm ${{ env.DEPLOY_DIR }}/presenter.db-wal
          touch ${{ env.DEPLOY_DIR }}/presenter.db

          echo "Importing ProPresenter libraries..."
          PRESENTER_DB_URL=sqlite://${{ env.DEPLOY_DIR }}/presenter.db \
            ${{ env.DEPLOY_DIR }}/import_propresenter --root "${{ env.PRESENTER_LIBRARY_ROOT }}"

          echo "Importing Bible translations..."
          PRESENTER_DB_URL=sqlite://${{ env.DEPLOY_DIR }}/presenter.db \
            ${{ env.DEPLOY_DIR }}/ingest_bibles

      - name: Deploy systemd service
        run: |
          sudo cp scripts/deploy/presenter.service /etc/systemd/system/
          sudo systemctl daemon-reload

      - name: Start service
        run: |
          sudo systemctl enable ${{ env.SERVICE_NAME }}
          sudo systemctl start ${{ env.SERVICE_NAME }}

      - name: Verify deployment
        run: |
          sleep 5
          if systemctl is-active --quiet ${{ env.SERVICE_NAME }}; then
            echo "Service is running"
            curl -sf http://localhost:80/healthz || echo "Warning: healthz check failed"
          else
            echo "Service failed to start"
            sudo journalctl -u ${{ env.SERVICE_NAME }} -n 50 --no-pager
            exit 1
          fi

      - name: Show deployment info
        run: |
          echo "=== Deployment Complete ==="
          echo "Version: $(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          echo "Binary: ${{ env.DEPLOY_DIR }}/presenter-server"
          echo "Service: ${{ env.SERVICE_NAME }}"
          systemctl status ${{ env.SERVICE_NAME }} --no-pager || true
