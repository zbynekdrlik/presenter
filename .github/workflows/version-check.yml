name: Version Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Validate Version
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Validate dev branch version
        if: github.ref == 'refs/heads/dev'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "::error::Dev branch version must match pattern X.Y.Z-dev.N"
            echo "Current version: $VERSION"
            echo "Expected pattern: X.Y.Z-dev.N (e.g., 0.1.0-dev.1)"
            exit 1
          fi
          echo "Version $VERSION is valid for dev branch"

      - name: Check version is increasing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get latest release version (if any)
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            echo "No previous releases found - version $VERSION is valid"
            exit 0
          fi

          # Remove 'v' prefix if present
          LATEST="${LATEST#v}"
          echo "Current version: $VERSION"
          echo "Latest release:  $LATEST"

          # Compare versions using sort -V
          HIGHER=$(printf '%s\n%s' "$LATEST" "$VERSION" | sort -V | tail -n1)

          if [ "$HIGHER" = "$LATEST" ]; then
            echo "::error::Version must be greater than latest release"
            echo "Current: $VERSION"
            echo "Latest:  $LATEST"
            echo "Please increment the version in Cargo.toml"
            exit 1
          fi

          if [ "$VERSION" = "$LATEST" ]; then
            echo "::error::Version cannot equal latest release"
            echo "Current: $VERSION"
            echo "Latest:  $LATEST"
            echo "Please increment the version in Cargo.toml"
            exit 1
          fi

          echo "Version $VERSION is greater than latest release $LATEST"

      - name: Validate main branch version
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Main branch version must be clean semver (no pre-release suffix)"
            echo "Current version: $VERSION"
            echo "Expected pattern: X.Y.Z (e.g., 0.1.0)"
            exit 1
          fi
          echo "Version $VERSION is valid for main branch"

      - name: Validate PR to main
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          # PRs to main should come from dev or release-please branches
          SOURCE_BRANCH="${{ github.head_ref }}"
          if [[ "$SOURCE_BRANCH" != "dev" && ! "$SOURCE_BRANCH" =~ ^release-please ]]; then
            echo "::warning::PRs to main should typically come from 'dev' branch"
            echo "Source branch: $SOURCE_BRANCH"
          fi

          # Version in PR to main should be clean semver (release-please will handle this)
          VERSION="${{ steps.version.outputs.version }}"
          echo "PR version: $VERSION"

          # Allow pre-release versions in PR (release-please will update)
          if [[ "$VERSION" =~ -dev\. ]]; then
            echo "::notice::Version has dev suffix - release-please will update this"
          fi
