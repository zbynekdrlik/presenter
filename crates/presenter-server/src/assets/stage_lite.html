<!DOCTYPE html>
<!-- ndi-lite: plain-JS WHEP stage player for weak displays (experiment, see #379).

     The 1GB Vestel TVs hitch ~400ms every ~20s on the full WASM stage page —
     the periodic render work (status-bar autofit synchronous reflow + Leptos
     churn) stalls the WebView compositor. The lite page is PROVEN smooth on the
     same TVs because it has no WASM and no per-frame layout thrash: one
     fullscreen <video> driven by ~150 lines of plain JS mirroring the WASM
     client's watchdog semantics.

     The NDI-fullscreen overlay info (clock / song number / connection / version)
     is replicated here as LIGHTWEIGHT fixed-size plain DOM — NO autofit, NO
     measure-resize, NO framework. Updates are cheap textContent writes: a 1s
     clock tick, a 3s song-number fetch poll, connection text driven off the
     player's OWN WHEP/peer state, and a one-shot /healthz version read at load.
     Fixed CSS font sizes are the whole point — zero per-frame/per-second layout
     work, so the overlay adds NO measurable presentation hitch. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stage (NDI lite)</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
  /* Promote the video to its OWN compositor layer so overlay repaints never
     force it to recomposite — the fix for the ~400ms periodic present-gap that
     appeared on weak TV WebViews once any overlay was added over the video. */
  video {
    position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; background: #000;
    transform: translateZ(0); will-change: transform; backface-visibility: hidden;
    z-index: 1;
  }

  /* Lightweight NDI overlay — mirrors the WASM stage status bar's look
     (bottom strip, tabular-nums, the same colors) but with FIXED font sizes
     in vh. NO autofit, NO reflow-per-tick — the entire reason the lite page
     stays smooth where the WASM bar hitches. The whole overlay is
     pointer-events:none so it never intercepts taps on the video. */
  .nl-overlay {
    position: fixed; left: 0; right: 0; bottom: 0; height: 7vh;
    pointer-events: none; z-index: 10;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    /* Own GPU layer + paint/layout containment: the overlay's per-second
       textContent updates stay self-contained and must NOT recomposite the
       video layer beneath. `isolation:isolate` gives it its own stacking
       context; `contain` bounds layout/style/paint to this subtree. */
    transform: translateZ(0); will-change: transform;
    isolation: isolate; contain: layout style paint;
  }
  .nl-clock {
    position: absolute; left: 2%; bottom: 0; width: 15%; height: 100%;
    display: flex; align-items: center; justify-content: flex-start;
    color: #38bdf8; font-weight: 700; font-size: 4vh;
    font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden;
  }
  .nl-song-number {
    position: absolute; left: 18%; bottom: 0; width: 10%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #60a5fa; font-weight: 700; font-size: 4vh;
    font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden;
  }
  .nl-song-number[data-empty="true"] { display: none; }
  .nl-connection {
    position: absolute; right: 2%; bottom: 0; width: 30%; height: 100%;
    display: flex; align-items: flex-end; justify-content: flex-end;
    color: #38bdf8; font-family: "Courier New", Courier, monospace;
    font-weight: 600; font-size: 1.8vh; letter-spacing: 0.05em;
    text-transform: uppercase; white-space: nowrap; overflow: hidden;
    font-variant-numeric: tabular-nums; text-align: right;
  }
  /* Connection-state colors mirror the WASM bar's .stage__connection--* rules. */
  .nl-connection[data-state="connecting"] { color: #fbbf24; }
  .nl-connection[data-state="connected"] { color: #38bdf8; }
  .nl-connection[data-state="reconnecting"] { color: #fb923c; }
  .nl-connection[data-state="disconnected"] { color: #ef4444; }
  .nl-version {
    position: absolute; right: 2%; bottom: 2vh; width: 30%; height: 1.8vh;
    display: flex; align-items: flex-end; justify-content: flex-end;
    color: rgba(255, 255, 255, 0.6); font-size: 1.4vh;
    white-space: nowrap; overflow: hidden; text-align: right;
  }
  /* Each field is a fixed-size box; contain its repaints so a textContent
     change (clock tick, status, song#) repaints ONLY that box — never a
     reflow that could reach the video layer. */
  .nl-clock, .nl-song-number, .nl-connection, .nl-version { contain: layout paint; }
</style>
</head>
<body data-ndi-lite="true" data-layout-code="ndi-fullscreen">
<video data-role="ndi-video" autoplay muted playsinline></video>
<!-- Fixed-size plain-DOM overlay (no autofit). Populated by cheap textContent
     updates only — see the JS below. -->
<div class="nl-overlay" data-role="ndi-overlay">
  <div class="nl-clock" data-role="clock">--:--:--</div>
  <div class="nl-song-number" data-role="song-number" data-empty="true"></div>
  <div class="nl-version" data-role="version"></div>
  <div class="nl-connection" data-role="connection" data-state="disconnected">DISCONNECTED</div>
</div>
<script>
"use strict";
(function () {
  // Same localStorage keys as the WASM stage client (ndi_watchdog.rs), so a
  // TV that already PROVED compat mode there keeps it here and vice versa.
  // The key keeps its historical name "ndiCodecMode" deliberately.
  var PROFILE_KEY = "ndiCodecMode";
  var DISPLAY_ID_KEY = "ndiDisplayId";
  var STALL_NO_FRAME_MS = 10000;     // playing, then 0 frames this long -> reconnect
  var NO_DECODE_FALLBACK_MS = 15000; // connected, never a frame -> profile toggle (once)
  var PROVEN_FRAMES = 100;           // frames that prove a mode...
  var PROVEN_WINDOW_MS = 10000;      // ...iff they land within 10s of the first (>=10fps)
  var JITTER_BUFFER_MS = 150;       // receiver buffer slack (ms). 0 stalled/froze playout (underrun); 150 keeps it playing. Non-zero is REQUIRED on these TVs.
  var SHOW_OVERLAY = false;         // RELIABILITY TEST: false = NO DOM overlay (pure video) to test whether the clock/song overlay composited over video freezes the weak TVs' compositor (decode runs, display frozen). If bare video is reliable, the overlay moves server-side into the stream.
  var BEACON_TICK_MS = 15000;
  var BEACON_FRAME_PERIOD = 300;
  var SOURCE_POLL_MS = 5000;
  var SONG_POLL_MS = 8000;          // cheap snapshot fetch for the #song-number overlay (8s: fewer allocations/GC over the video)
  var SONG_POLL_BACKOFF_MS = 30000; // when the snapshot 404s (empty DB, #383) poll slowly

  var video = document.querySelector('video[data-role="ndi-video"]');

  // ── Lightweight NDI overlay (clock / song / connection / version) ──────────
  // FIXED-size plain DOM mirroring the WASM stage StatusBar. All updates are
  // cheap textContent writes; no measure/resize/autofit, so the overlay never
  // forces a synchronous reflow (the WASM bar's ~400ms hitch source). The
  // connection element is driven off the player's OWN WHEP state + getStats RTT.
  var clockEl = document.querySelector('[data-role="clock"]');
  var songEl = document.querySelector('[data-role="song-number"]');
  var connEl = document.querySelector('[data-role="connection"]');
  var versionEl = document.querySelector('[data-role="version"]');
  // RTT (ms) sampled from getStats during beacons; null until first sample.
  var lastRttMs = null;

  function pad2(n) { return n < 10 ? "0" + n : "" + n; }

  // Clock tick — local HH:MM, repainted at most ONCE PER MINUTE. Showing
  // seconds forced a textContent write (→ compositor repaint of the overlay
  // layer OVER the video) every single second; on the weak TV compositors
  // that per-second repaint occasionally collides with a video-frame present
  // and stalls it ~400ms (the periodic sd1 hitch that bare video-only lite did
  // NOT have). HH:MM repaints 1×/min instead of 60×/min. The tick still fires
  // every second (so the minute flips promptly) but does ZERO allocation and
  // ZERO DOM work on the 59 no-op ticks: Date.now() is a number (no Date
  // object), and we only build a Date + format string + write when the minute
  // bucket actually changes.
  var lastMinuteBucket = -1;
  function updateClock() {
    if (!clockEl) return;
    var bucket = Math.floor(Date.now() / 60000); // number math, no allocation
    if (bucket === lastMinuteBucket) return;      // same minute → no paint, no alloc
    lastMinuteBucket = bucket;
    var d = new Date();
    clockEl.textContent = pad2(d.getHours()) + ":" + pad2(d.getMinutes());
  }

  // Set the connection overlay text + color. state is one of
  // connecting|connected|reconnecting|disconnected (CSS picks the color).
  // Mirrors status_bar.rs connection_text: "CONNECTED · 12 ms" etc.
  function setConnection(state) {
    if (!connEl) return;
    var label = state === "connected" ? "CONNECTED"
      : state === "connecting" ? "CONNECTING…"
      : state === "reconnecting" ? "RECONNECTING…"
      : "DISCONNECTED";
    var rtt = (state === "connected" && lastRttMs != null)
      ? " · " + Math.round(lastRttMs) + " ms" : "";
    var txt = label + rtt;
    if (connEl.getAttribute("data-state") !== state) connEl.setAttribute("data-state", state);
    if (connEl.textContent !== txt) connEl.textContent = txt; // write only on change
  }

  // Poll the song number from the SAME snapshot the WASM page uses (the stage
  // WS `snapshot`). The lightweight equivalent is GET /stage/snapshot (JSON).
  // Render "#142" like the WASM bar; hide gracefully when there is no song
  // number, or when the endpoint 404s on an empty DB (#383).
  //
  // SELF-SCHEDULING with backoff: a 404 (empty DB) is logged by the browser's
  // network layer regardless of our catch, so on repeated 404 we slow the poll
  // from 3s to 30s — keeping the console quiet AND the poll cheap until data
  // appears, then snap back to the 3s cadence as soon as the endpoint answers.
  function hideSong() {
    if (!songEl) return;
    songEl.setAttribute("data-empty", "true");
    songEl.textContent = "";
  }
  async function pollSongNumber() {
    if (!songEl) return SONG_POLL_MS;
    try {
      var resp = await fetch("/stage/snapshot");
      if (!resp.ok) { hideSong(); return SONG_POLL_BACKOFF_MS; }
      var snap = await resp.json();
      var n = snap && snap.songNumber;
      if (n != null && n !== "") {
        var st = "#" + n;
        if (songEl.textContent !== st) songEl.textContent = st; // write only on change
        if (songEl.getAttribute("data-empty") !== "false") songEl.setAttribute("data-empty", "false");
      } else {
        hideSong();
      }
      return SONG_POLL_MS;
    } catch (e) {
      // Network/parse failure: hide rather than show stale — overlay must
      // never disturb the smooth player. Back off like the 404 case.
      hideSong();
      return SONG_POLL_BACKOFF_MS;
    }
  }
  function scheduleSongPoll(delayMs) {
    setTimeout(async function () {
      var next = await pollSongNumber();
      scheduleSongPoll(next);
    }, delayMs);
  }

  // One-shot version read from /healthz (already returns {version, channel}).
  // Mirrors VersionLabel: "v{version} ({channel})" for dev, "v{version}" for
  // release / empty channel.
  async function loadVersion() {
    if (!versionEl) return;
    try {
      var resp = await fetch("/healthz");
      if (!resp.ok) return;
      var h = await resp.json();
      if (!h || !h.version) return;
      var ch = h.channel || "";
      versionEl.textContent = (ch === "" || ch === "release")
        ? "v" + h.version
        : "v" + h.version + " (" + ch + ")";
    } catch (e) { /* version is decorative; never disturb playback */ }
  }

  if (SHOW_OVERLAY) {
    updateClock();
    setInterval(updateClock, 1000);
    loadVersion();
    scheduleSongPoll(0); // self-scheduling; backs off to SONG_POLL_BACKOFF_MS on 404
    setConnection("connecting");
  } else {
    // Pure-video mode: remove the overlay layer entirely so nothing composites
    // over the video element (the suspected weak-TV compositor-freeze source).
    var ov = document.querySelector(".nl-overlay");
    if (ov && ov.parentNode) ov.parentNode.removeChild(ov);
  }
  var store = (function () { try { return window.localStorage; } catch (e) { return null; } })();
  // Weak-TV-safe DEFAULT: COMPAT (480p, reliably decodes on every TV) unless
  // this display explicitly proved DEFAULT (720p) before. Starting on 720p left
  // weak TVs unable to decode at all (frames_decoded stuck at 0, no recovery).
  var compat = !(store && store.getItem(PROFILE_KEY) === "default");
  var profileSwitched = false; // at most ONE compat toggle per page load
  var backoffMs = 0;

  // PRESENTATION-GAP accumulators for the CURRENT beacon interval (mirrors the
  // WASM client's FrameStats present-gap fields). These measure RENDER-side
  // cadence — how evenly presented frames reach the screen — which the
  // decode-side getStats fields are blind to: a frame can decode on time yet
  // be presented late (WebView compositor / main-thread hitch). Reset on each
  // beacon (snapshotPresentGaps) so every beacon reports only the last interval.
  var PRESENT_GAP_HITCH_MS = 100; // >100ms gap = perceptible hitch (>=3 frames @30fps)
  var maxPresentGapMs = 0;        // largest inter-present gap this interval
  var presentGapsOver100 = 0;     // count of >100ms gaps this interval
  var presentedInInterval = 0;    // frames presented this interval (rVFC count)
  var intervalStartedAt = performance.now(); // when this interval began (last reset)

  // Fold one inter-present gap (ms) into the interval accumulators.
  function recordPresentGap(gapMs) {
    if (gapMs > maxPresentGapMs) maxPresentGapMs = gapMs;
    if (gapMs > PRESENT_GAP_HITCH_MS) presentGapsOver100++;
  }

  // Snapshot the present-gap accumulators for a beacon and RESET them, so the
  // NEXT beacon reports only its own interval (last-interval, not cumulative).
  // Returns { maxPresentGapMs, presentGapsOver100, presentedFps } where
  // presentedFps is render-side fps (frames presented / interval-seconds),
  // distinct from the decode-side getStats fps; null when no time elapsed yet.
  function snapshotPresentGaps() {
    var now = performance.now();
    var elapsedMs = now - intervalStartedAt;
    var snap = {
      maxPresentGapMs: maxPresentGapMs,
      presentGapsOver100: presentGapsOver100,
      presentedFps: elapsedMs > 0 ? presentedInInterval / (elapsedMs / 1000) : null,
    };
    maxPresentGapMs = 0;
    presentGapsOver100 = 0;
    presentedInInterval = 0;
    intervalStartedAt = now;
    return snap;
  }

  function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  function displayId() {
    if (!store) return null;
    var id = store.getItem(DISPLAY_ID_KEY);
    if (id) return id;
    id = "";
    for (var i = 0; i < 16; i++) id += Math.floor(Math.random() * 16).toString(16);
    store.setItem(DISPLAY_ID_KEY, id);
    return id;
  }

  async function findActiveSource() {
    try {
      var resp = await fetch("/integrations/video-sources");
      if (!resp.ok) return null;
      var list = await resp.json();
      var active = (list || []).find(function (s) { return s.isActive; });
      return active ? active.id : null;
    } catch (e) { return null; }
  }

  async function whepConnect(sourceId) {
    var pc = new RTCPeerConnection();
    try {
      return await whepNegotiate(pc, sourceId);
    } catch (e) {
      pc.close(); // never leak a peer connection from a failed attempt
      throw e;
    }
  }

  async function whepNegotiate(pc, sourceId) {
    pc.addTransceiver("video", { direction: "recvonly" });
    // VIDEO-ONLY offer — deliberately NO audio m-line. The server never
    // sends audio (NDI audio is discarded), and an SDP audio track that
    // exists but never produces makes weak TV WebViews hold video
    // presentation hostage to A/V sync that can never be satisfied
    // (measured 2026-06-12: VDO.Ninja with noaudio played 640x360@20 on the
    // same Vestel where our stream with a dead audio m-line presented
    // ~0.5fps with frames decoding fine).
    pc.ontrack = function (ev) {
      if (!ev.streams || !ev.streams[0]) return;
      try {
        // SMALL jitter buffer (NOT zero). jitterBufferTarget=0 minimized latency
        // but left the playout with no slack: a frame arriving slightly late
        // underran the empty buffer → a ~400ms stall-then-catchup every ~20s
        // (the residual stutter, present on EVERY TV — decode stayed at full fps,
        // only PRESENTATION hitched). ~150ms absorbs LAN/encoder jitter while
        // staying lip-sync-tight, exactly the balance libwebrtc/VDO.Ninja strike.
        // Applied to BOTH tiers — the weak compat TVs need the slack most.
        ev.receiver.jitterBufferTarget = JITTER_BUFFER_MS;
        ev.receiver.playoutDelayHint = JITTER_BUFFER_MS / 1000;
      } catch (e) { /* optional knobs */ }
      // muted PROPERTY before srcObject, or Chrome's autoplay policy blocks play().
      video.muted = true;
      video.srcObject = ev.streams[0];
      video.muted = true;
      var p = video.play();
      if (p && p.catch) p.catch(function (e) { console.warn("video.play() rejected: " + e); });
    };
    var offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(function (res) {
      if (pc.iceGatheringState === "complete") return res();
      pc.addEventListener("icegatheringstatechange", function () {
        if (pc.iceGatheringState === "complete") res();
      });
      setTimeout(res, 4000); // bounded gather wait; partial candidates still connect on LAN
    });
    var url = "/ndi/whep/" + sourceId + (compat ? "?profile=compat" : "");
    var resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/sdp" },
      body: pc.localDescription.sdp,
    });
    if (!resp.ok) { throw new Error("WHEP POST returned " + resp.status); }
    var loc = resp.headers.get("Location");
    var resourceUrl = loc ? new URL(loc, window.location.origin).toString() : null;
    await pc.setRemoteDescription({ type: "answer", sdp: await resp.text() });
    return { pc: pc, resourceUrl: resourceUrl };
  }

  function dispatchDelete(resourceUrl) {
    if (!resourceUrl) return;
    try { fetch(resourceUrl, { method: "DELETE", keepalive: true }); } catch (e) { /* best effort */ }
  }

  // getStats() gathering BLOCKS the render thread on weak WebViews (~400ms
  // measured on the Vestels). Calling it every beacon produced a ~400ms
  // present-gap hitch at the beacon cadence — the residual periodic stutter the
  // user sees "every ~20s". So gather getStats only every STATS_EVERY beacons;
  // the cheap render-side present-gap metrics (tracked locally via rVFC, NO
  // getStats) still report EVERY beacon, and RTT/decode/codec carry forward
  // their last sampled value between gatherings.
  var beaconCount = 0;
  var STATS_EVERY = 4;
  var lastStats = {
    codec: null, framesDecoded: null, fps: null,
    jitterBufferMs: null, freezeCount: null, framesDropped: null,
  };
  async function postBeacon(pc, sourceId) {
    try {
      beaconCount++;
      if (beaconCount % STATS_EVERY === 1) {
        // Heavy path (≈ every 60s): gather getStats off the frequent cadence.
        var report = await pc.getStats();
        var inbound = null;
        var selectedPair = null;
        report.forEach(function (s) {
          if (s.type === "inbound-rtp" && s.kind === "video") inbound = s;
          // Selected ICE candidate pair carries currentRoundTripTime (seconds).
          if (s.type === "candidate-pair" && (s.nominated || s.selected) &&
              typeof s.currentRoundTripTime === "number") {
            selectedPair = s;
          }
        });
        if (selectedPair) {
          lastRttMs = selectedPair.currentRoundTripTime * 1000;
          setConnection("connected");
        }
        if (inbound && inbound.codecId) {
          var c = report.get(inbound.codecId);
          lastStats.codec = (c && c.mimeType) || lastStats.codec;
        }
        if (inbound) {
          lastStats.framesDecoded = inbound.framesDecoded;
          lastStats.fps = inbound.framesPerSecond;
          if (inbound.jitterBufferEmittedCount > 0) {
            lastStats.jitterBufferMs =
              (inbound.jitterBufferDelay / inbound.jitterBufferEmittedCount) * 1000;
          }
          lastStats.freezeCount = inbound.freezeCount;
          lastStats.framesDropped = inbound.framesDropped;
        }
      }
      var gaps = snapshotPresentGaps();
      await fetch("/ndi/client-stats", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sourceId: sourceId,
          displayId: displayId(),
          codec: lastStats.codec,
          profile: compat ? "compat" : "default",
          screen: window.screen ? window.screen.width + "x" + window.screen.height : null,
          framesDecoded: lastStats.framesDecoded,
          fps: lastStats.fps,
          jitterBufferMs: lastStats.jitterBufferMs,
          freezeCount: lastStats.freezeCount,
          framesDropped: lastStats.framesDropped,
          // Render-side presentation-cadence metrics for this beacon interval.
          maxPresentGapMs: gaps.maxPresentGapMs,
          presentGapsOver100: gaps.presentGapsOver100,
          presentedFps: gaps.presentedFps,
          lite: true,
        }),
      });
    } catch (e) { /* beacons must never disturb playback */ }
  }

  // One connected session: resolves with a reason string when the session is
  // no longer healthy (stall / ICE loss / profile toggle). Frame observation
  // uses requestVideoFrameCallback (per PRESENTED frame, not timer-throttled)
  // with a 1s currentTime-advance fallback for rVFC-less browsers.
  function superviseSession(pc, sourceId) {
    return new Promise(function (resolve) {
      var done = false;
      var frames = 0;
      var firstFrameAt = 0;
      var lastFrameAt = performance.now();
      var startedAt = performance.now();
      var lastCurrentTime = 0;
      var hasRvfc = typeof video.requestVideoFrameCallback === "function";
      // Fresh present-gap interval for this session (accumulators are
      // module-scoped and persist across reconnects — clear them so the first
      // beacon of a new session never reports a previous session's hitches).
      maxPresentGapMs = 0;
      presentGapsOver100 = 0;
      presentedInInterval = 0;
      intervalStartedAt = startedAt;

      function finish(reason) {
        if (done) return;
        done = true;
        // Session ended (stall / ICE loss / profile toggle): the main loop
        // will retry, so reflect RECONNECTING (orange) in the overlay. RTT is
        // stale now — clear it so a reconnect doesn't show an old "· N ms".
        lastRttMs = null;
        setConnection("reconnecting");
        clearInterval(ticker);
        clearInterval(beaconTimer);
        resolve(reason);
      }
      function onFrame() {
        frames++;
        var now = performance.now();
        // Inter-present gap = wall-clock since the PREVIOUS presented frame;
        // skip the first frame (no predecessor) so a long pre-roll wait is not
        // charged as a hitch. Fold BEFORE overwriting lastFrameAt.
        if (frames > 1) recordPresentGap(now - lastFrameAt);
        presentedInInterval++;
        lastFrameAt = now;
        // First presented frame proves the session is live — flip the overlay
        // to CONNECTED immediately (RTT fills in on the next beacon).
        if (frames === 1) { firstFrameAt = now; backoffMs = 0; setConnection("connected"); }
        // Persist the CURRENT mode only once PROVEN at a usable rate
        // (100 frames within 10s of the first) — never a broken crawl.
        if (frames === PROVEN_FRAMES && now - firstFrameAt <= PROVEN_WINDOW_MS && store) {
          store.setItem(PROFILE_KEY, compat ? "compat" : "default");
        }
        // Beacons fire on the timer ONLY (single clean cadence) — a second,
        // frame-counted beacon source doubled getStats and its render-thread
        // stalls. (BEACON_FRAME_PERIOD retained for the no-rVFC fallback path.)
      }
      function rvfcLoop() {
        if (done) return;
        onFrame();
        video.requestVideoFrameCallback(rvfcLoop);
      }
      if (hasRvfc) video.requestVideoFrameCallback(rvfcLoop);

      pc.oniceconnectionstatechange = function () {
        var s = pc.iceConnectionState;
        if (s === "failed" || s === "disconnected" || s === "closed") {
          console.warn("ndi-lite: ICE state=" + s + ", reconnecting");
          finish("ice-" + s);
        }
      };

      var beaconTimer = setInterval(function () { postBeacon(pc, sourceId); }, BEACON_TICK_MS);
      var ticker = setInterval(function () {
        if (done) return;
        // Belt-and-braces ICE check: catches a state reached BEFORE the
        // oniceconnectionstatechange handler was installed.
        var ice = pc.iceConnectionState;
        if (ice === "failed" || ice === "disconnected" || ice === "closed") {
          console.warn("ndi-lite: ICE state=" + ice + ", reconnecting");
          finish("ice-" + ice);
          return;
        }
        if (!hasRvfc) {
          // coarse fallback: currentTime advancing counts as one frame per tick
          var t = video.currentTime;
          if (t > 0 && Math.abs(t - lastCurrentTime) > 0.001) { lastCurrentTime = t; onFrame(); }
        }
        var now = performance.now();
        if (frames === 0) {
          // Connected but never decoded: toggle the profile ONCE per page
          // load (mirrors the WASM watchdog's bounded fallback), else WAIT —
          // a connected frameless consumer must not reconnect-churn.
          var connected = pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed";
          if (connected && now - startedAt > NO_DECODE_FALLBACK_MS && !profileSwitched) {
            profileSwitched = true;
            compat = !compat;
            console.warn("ndi-lite: 0 frames " + ((now - startedAt) / 1000).toFixed(0) +
              "s after connect — switching profile to " + (compat ? "compat" : "default"));
            finish("profile-toggle");
          }
          return;
        }
        if (now - lastFrameAt > STALL_NO_FRAME_MS) {
          console.warn("ndi-lite: no frame presented for " + Math.round(now - lastFrameAt) + "ms — reconnecting");
          finish("stall");
        }
      }, 1000);
    });
  }

  async function backoffSleep() {
    backoffMs = Math.min(backoffMs === 0 ? 500 : backoffMs * 2, 5000);
    await sleep(backoffMs);
  }

  var session = null; // { pc, resourceUrl }
  window.addEventListener("pagehide", function () {
    if (session) dispatchDelete(session.resourceUrl);
  });

  // Close the session WITHOUT touching the video element: across an
  // intra-page reconnect the next session's ontrack simply replaces the
  // stream (same as the WASM client), keeping the element's playback clock
  // monotonic and avoiding a flash to black during recovery.
  function teardown() {
    if (!session) return;
    dispatchDelete(session.resourceUrl);
    try { session.pc.close(); } catch (e) { /* already closed */ }
    session = null;
    video.removeAttribute("data-source-id");
  }

  (async function main() {
    for (;;) {
      var sourceId = await findActiveSource();
      if (!sourceId) {
        // Idle (no active source): black screen is the honest state.
        if (video.srcObject) video.srcObject = null;
        lastRttMs = null;
        setConnection("disconnected");
        await sleep(SOURCE_POLL_MS);
        continue;
      }
      video.setAttribute("data-source-id", sourceId);
      setConnection("connecting");
      try {
        session = await whepConnect(sourceId);
      } catch (e) {
        // Keep data-source-id during transient retries — the player is
        // still bound to this source. The attribute clears on session
        // teardown and stays cleared while no source is active (the loop
        // re-binds it as soon as a source is).
        console.warn("WHEP connect for " + sourceId + " failed: " + e);
        await backoffSleep();
        continue;
      }
      await superviseSession(session.pc, sourceId);
      teardown();
      // Stall/ICE-loss reconnects retry immediately the first time; repeated
      // failures grow through backoffSleep (cap 5s) in the catch above.
    }
  })();
})();
</script>
</body>
</html>
