services:
  presenter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-presenter-demo}-app
    restart: unless-stopped
    environment:
      PRESENTER_PORT: 8080
      PRESENTER_DB_URL: sqlite:///data/presenter.db
      PRESENTER_IMPORT_ROOT: /imports
      PRESENTER_DATA_DIR: /data
      PRESENTER_FORCE_IMPORT: ${PRESENTER_FORCE_IMPORT:-0}
      PRESENTER_COMPANION_ENABLED: ${PRESENTER_COMPANION_ENABLED:-0}
      PRESENTER_COMPANION_PORT: ${PRESENTER_COMPANION_PORT:-18175}
      RUST_LOG: ${RUST_LOG:-presenter_server=info}
      PRESENTER_OSC_HOST_PORT: ${HOST_OSC_PORT:-39051}
      ADB_VENDOR_KEYS: ${ADB_KEYS_DIR:-/root/.android}
    volumes:
      - ${DEMO_DATA_DIR}:/data
      - ${IMPORT_ROOT}:/imports:ro
      - ${ADB_KEYS_DIR:-/root/.android}:/root/.android
    ports:
      - "${HOST_HTTP_PORT:-8080}:8080"
      - "${HOST_OSC_PORT:-39051}:39051/tcp"
      - "${HOST_OSC_PORT:-39051}:39051/udp"
      - "${HOST_COMPANION_PORT:-18175}:${PRESENTER_COMPANION_PORT:-18175}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s
